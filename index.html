 말보다 텍스트 우선\\n② '갈등이 해결되면 왜 마음이 풀릴까요?' 핵심 질문 1개\\n③ 본 수업 85p로 자연스럽게 진입\\n\\n📊 이 학급 1교시 수학(이○○ 선생님) 메모: '새 단원 시작, 집중도 높음' — 새 자극에 잘 반응하는 학급입니다.\"},\n    {q:\"진도 어디서부터?\",a:\"📋 지난 수업 기록 (NEIS 시간표 기반):\\n• 5/12(화) 3교시 국어: 78~84p 진행 완료\\n• 오늘 예정 (5/14): 85~90p 심화 독해 + 등장인물 심리 분석\\n\\n💡 진도 조정 권고:\\n오늘은 참여 위험도 53% (점검 필요)이라 — 새 개념을 한 번에 다 넣기보다 85~88p 핵심만 집중하고, 89~90p는 다음 차시로 미루는 것을 권장합니다.\\n\\n📝 이전 수업 메모: 갈등 해결 과정 서술 표현 보충 필요\"},\n    {q:\"지금 학급 분위기?\",a:\"📊 현재 참여 위험도 53% — '점검 필요형'입니다.\\n\\n오늘 이미 진행된 수업 기록:\\n• 1교시 수학 (이○○ 선생님): 집중된 편 — '새 단원 시작이라 집중도 높음, 뒷자리 일부 졸음'\\n• 2교시 영어 (박○○ 선생님): 보통 — '4~5명 졸음, 발표 과제 후 개선'\\n• 3교시 과학 (최○○ 선생님): 집중된 편 — '모둠 실험 활동, 활동 선호 학급'\\n\\n🔍 패턴: 정적 강의보다 활동·과제 투입 시 빠르게 회복되는 학급. 5교시도 짧은 활동 끼워 넣으면 효과적입니다.\"},\n    {q:\"유사 조건 다른 교사 경험은?\",a:\"👥 동료 교사 누적 데이터 (Case-Based Reasoning):\\n\\n현재는 서비스 초기로 동료 교사 피드백 데이터가 충분히 누적되지 않았습니다. 시간이 흐를수록 '체육 직후 + 5교시 + 점심 후' 조건에서 어떤 전략이 효과적이었는지 학습됩니다.\\n\\n📚 학술 기반 가설 (현 단계 추천):\\n• Marzano (2009): 도입부 첫 5분이 수업 전체 집중도 결정\\n• von der Embse (2018): 정서적 안전감 멘트가 자기효능감 보호\\n• ACSM (2016): 신체활동 후 10~15분이 인지 회복 골든타임\\n\\n향후 {{teacher}} 선생님과 동료 교사의 실제 경험이 누적되면 더 정확한 추천이 가능해집니다.\"},\n    {q:\"참여 위험도가 정확히 뭐예요?\",a:\"📌 <strong>참여 저하 위험 (Disengagement Risk)<\u002Fstrong>\\n\\n오늘 학급 환경이 학생 참여를 어렵게 만들 가능성을 0~100% 척도로 추정한 값입니다.\\n학술 출처: Fredricks et al. (2004) — Behavioral·Emotional·Cognitive Engagement 개념의 환경 기반 추정 변형.\\n\\n✓ 측정하는 것: 교실 환경 변인의 누적도 (교시·날씨·학사일정·학급 크기 등)\\n✗ 측정하지 않는 것: 학생 개인의 집중도·능력·학습 성취 예측·교사 직무 부담\\n\\n⚠ {{teacher}} 선생님께 정직히 말씀드리면 — 단일 변인 효과는 학술 검증되었으나 누적 시너지는 가설입니다. 환경 변인과 수업 참여는 상관관계이지 인과로 단정할 수 없습니다.\\n\\n💡 본 수치는 '정답'이 아닌 '참고용 지표'입니다. 자세한 내용은 메인 카드의 ⓘ 버튼을 눌러주세요.\"},\n    {q:\"이 위험도 신뢰할 만한가요?\",a:\"📐 본 참여 위험도(53%)는 8개 변인 × 가중치 모델로 산출되었습니다.\\n\\n✅ 강점:\\n• 4종 공공데이터 (NEIS·기상청·학교알리미) 실시간 연동\\n• 각 변인에 학술 근거 매핑 (Monk 2005, Sweller 1988, Hembree 1988 등)\\n• 변인 8개 가중치 합산 (총 45)\\n\\n⚠ 한계 (정직하게 짚어드립니다):\\n• 단일 변인 효과는 검증, 누적 시너지는 가설\\n• 날씨는 외부 기온만 (실내 환기 매개효과는 미반영)\\n• PAPS 학급 평균 단위 외삽 한계\\n• 행사 후 효과는 학술 빈약, 현장 직관 기반\\n• 환경 변인-수업 참여는 상관(correlation)이며 인과로 단정 불가\\n\\n💡 위 수치는 '참고용 지표'이며, {{teacher}} 선생님의 현장 관찰이 우선입니다.\"}\n  ]\n};\n\n/* ── RISK ENGINE ── */\nconst RV=[\n  {id:\"period\",label:\"교시\",weight:8,source:\"NEIS 시간표 API\",basis:\"오후 교시일수록 누적 인지 피로 + post-lunch dip 시간생리학적 현상 (Monk 2005). 한국 청소년 만성 수면부족(평균 6.07시간)으로 오후 효과 증폭 (제8차 청소년 건강행태조사)\",scorer(d){return{1:.05,2:.2,3:.38,4:.55,5:.72,6:.87,7:.95}[d.currentPeriod?.period]??.5}},\n  {id:\"prevSubject\",label:\"직전 수업\",weight:7,source:\"NEIS 시간표 API\",basis:\"체육 직후는 정서적 각성·교실 분위기 전환 부담 (classroom management 영역). 수학·과학 직후는 작업기억 부하 누적 (Sweller 1988 인지부하 이론, Skulmowski 2023 — 수학적 처리 부하 인문 대비 +40%). 신체활동 자체는 인지에 긍정적 (Xue 2020 메타분석)이나 교실 모드 전환은 별개 차원\",scorer(d){const s=d.currentPeriod?.prevLesson?.subject??\"\";const m={\"체육\":.9,\"실기\":.75,\"수학\":.52,\"과학\":.48,\"영어\":.35,\"국어\":.3,\"사회\":.28,\"역사\":.28,\"도덕\":.22,\"음악\":.2,\"미술\":.18,\"자습\":.08,\"조회\":.05};if(m[s]!==undefined)return m[s];const p=Object.entries(m).find(([k])=>s.includes(k));return p?p[1]:.35}},\n  {id:\"academicLevel\",label:\"학업 성취도\",weight:7,source:\"학교알리미 / 교과별 학업성취 (2025학년도)\",basis:\"학업 성취도가 행동·정서·인지 engagement를 예측 (Tian et al. 2017 — 중국 고교생 4036명 대상 검증). 한국 중학생 종단 연구로 보강 (유신복 2015, 최권 2013). 정적 변수 — 학급의 기저 위험 수준 결정\",scorer(d){return{\"높음\":.1,\"보통\":.5,\"낮음\":.88}[d.classProfile?.academicAchievementLevel??\"보통\"]??.5}},\n  {id:\"studentCount\",label:\"학급당 학생수\",weight:6,source:\"학교알리미 학급별 학생수\",basis:\"학급 크기는 학업 직접 효과보다 교사-학생 상호작용 질에 영향 (Bassok 2014 — 작은 학급이 상호작용 질 +0.33 SD). 큰 학급일수록 정교한 classroom management 필요 (Korpershoek 2025 메타분석). 한국 중등 평균 25.7명 (OECD 교육지표 2025) 기준 단계화\",scorer(d){const n=d.classProfile?.studentCount??25;if(n>=35)return.92;if(n>=32)return.75;if(n>=28)return.55;if(n>=24)return.35;return.2}},\n  {id:\"weather\",label:\"날씨/불쾌지수\",weight:6,source:\"기상청 단기예보 API\",basis:\"외부 기온 기반 불쾌지수 추정. 학술적으로는 실내 매개 효과(환기 제약·CO₂ 누적)가 더 결정적 (Harvard 2025, 임완철 2015)이나 본 모델은 단순 외부 지표로 한정 — 매개 효과는 향후 모델 확장 영역\",scorer(d){if(!d.weather)return.3;let b=Math.min(Math.max((d.weather.discomfortIndex-60)/18,0),1);if(d.weather.isRaining)b=Math.min(b+.2,1);return parseFloat(b.toFixed(3))}},\n  {id:\"calendar\",label:\"학사일정\",weight:6,source:\"NEIS 학사일정 API\",basis:\"시험 전 인지 자원이 시험 준비에 쏠려 일반 수업 중에도 주의 분산 (Hembree 1988 메타분석 r=-0.24, von der Embse 2018 r=-0.29). 한국 중학생 학업스트레스로 보강 (서경현 2016). 행사 후 효과는 학술 빈약 영역의 현장 직관 기반 추정\",scorer(d){if(!d.calendar)return.2;let s=0;if(d.calendar.isAfterEvent)s+=.35;if(d.calendar.isEventDay)s+=.25;const dy=d.calendar.daysToNextExam;if(dy!=null){if(dy<=3)s+=.55;else if(dy<=7)s+=.40;else if(dy<=14)s+=.25;else if(dy<=21)s+=.10}return Math.min(s,1)}},\n  {id:\"physicalFitness\",label:\"학급 체력\",weight:4,source:\"학교알리미 학생 체력 통계 (PAPS)\",basis:\"체력 수준이 executive function(주의 통제·작업기억·반응 억제)을 예측 (Donnelly et al. 2016 ACSM position stand, Sember 2020 메타분석). 한국 청소년 체력 2019년 OECD 최하위 (이상철 2020). PAPS 측정 신뢰성·학급 평균 단위 외삽은 한계로 인정\",scorer(d){return{\"높음\":.1,\"보통\":.5,\"낮음\":.88}[d.classProfile?.physicalFitnessLevel??\"보통\"]??.5}},\n  {id:\"meal\",label:\"급식 열량\",weight:1,source:\"NEIS 급식식단정보 / 급식 가정통신문\",basis:\"단순 칼로리는 학술적으로 약한 지표 — GI/GL이 더 결정적이나 청소년 효과 작음 (Müller 2021 CogniDo GI II — 고/중 GI 점심 인지 차이 무의미). 주된 점심-인지 효과는 시간생리학적 post-lunch dip이며 '교시' 변수에서 다룸. 가중치 1로 미세 보정 역할만\",scorer(d){if(!d.currentPeriod?.isAfterLunch||!d.meal?.available)return.05;const k=d.meal.estimatedCalories??700;if(k>=950)return.92;if(k>=800)return.65;if(k>=650)return.38;return.15}}\n];\n\nconst RL=[\n  {max:20, label:\"매우 안정\",  icon:\"😊\",color:\"#16A34A\",bg:\"#F0FDF4\",border:\"#BBF7D0\",iconBg:\"#DCFCE7\",\n   adv:\"수업 진행에\\n매우 좋은 조건입니다.\",\n   signs:\"위험 요인 거의 없음\",\n   approach:\"평소 계획대로 진행\"},\n  {max:40, label:\"안정\",       icon:\"🙂\",color:\"#65A30D\",bg:\"#F7FEE7\",border:\"#BEF264\",iconBg:\"#ECFCCB\",\n   adv:\"안정적인 환경입니다.\\n평소대로 진행하세요.\",\n   signs:\"가벼운 영향 요인만 감지\",\n   approach:\"예정된 수업 흐름 유지\"},\n  {max:60, label:\"점검 필요\",  icon:\"😐\",color:\"#D97706\",bg:\"#FFFBEB\",border:\"#FDE68A\",iconBg:\"#FEF3C7\",\n   adv:\"신경 쓸 부분이\\n일부 있습니다.\",\n   signs:\"오후 교시·전날 행사·식사 등 일부 피로 요인\",\n   approach:\"도입부 점검 · 중반 환기 포인트 확보\"},\n  {max:80, label:\"주의 필요\",  icon:\"😟\",color:\"#EA580C\",bg:\"#FFF7ED\",border:\"#FDBA74\",iconBg:\"#FEE2CC\",\n   adv:\"여러 부담 요인이\\n겹쳐 있습니다.\",\n   signs:\"피로 요인 3개 이상 중복\",\n   approach:\"활동 전환 조기 도입 · 설명 분절\"},\n  {max:101,label:\"개입 필요\",  icon:\"😣\",color:\"#DC2626\",bg:\"#FEF2F2\",border:\"#FCA5A5\",iconBg:\"#FEE2E2\",\n   adv:\"오늘은 컨디션 관리가\\n필요한 환경입니다.\",\n   signs:\"주요 위험 요인이 대부분 고위험 구간\",\n   approach:\"활성화 활동 우선 · 이론 전달 최소화\"}\n];\n\nconst RANK_COLORS=[\"#F97316\",\"#94A3B8\",\"#78350F\",\"#3B82F6\",\"#3B82F6\",\"#3B82F6\",\"#3B82F6\",\"#3B82F6\"];\n\nconst CP=[\n  {id:\"pe_trans\",icon:\"🎽\",shortTitle:\"체육→국어 전환 유도\",when:\"수업 시작 3~5분\",signal:\"체육 직후 — 아직 수업 모드로 전환이 덜 된 경우\",action:\"조용한 1분 묵독 → 핵심 질문 1개로 주의 수렴\",basis:\"체육 직후 신체→인지 전환 유예 시간 대응\",cond:c=>c.prevSubject.includes(\"체육\")},\n  {id:\"check15\",icon:\"⏰\",shortTitle:\"15분 경: 피로 반응 확인\",when:\"수업 시작 후 15분\",signal:\"반응 느려지거나 멍함이 2명+ 보이면\",action:\"계획 중인 활동을 당기거나 확인 질문 1개 삽입\",basis:\"체육 직후 인지 피로 피크 구간 (활동 후 15~20분)\",cond:c=>c.prevSubject.includes(\"체육\")||c.period>=5},\n  {id:\"trough25\",icon:\"🍱\",shortTitle:\"20~25분: 집중 저점 대응\",when:\"수업 20~25분 구간\",signal:\"식후 혈당 변화 집중 저점 — 의도적 환기 필요\",action:\"30초 스트레칭 허용 또는 짝 확인 질문 1개\",basis:\"점심 직후 고열량(1,143kcal) + 5교시 복합 조건\",cond:c=>c.isAfterLunch&&c.kcal>=800},\n  {id:\"event\",icon:\"🏃\",shortTitle:\"내일 행사: 잡담 선제 정리\",when:\"수업 중 언제든\",signal:\"'스포츠 한마당' 관련 잡담·들뜸이 보이면\",action:\"'수업 끝나고 같이 얘기해요' — 단호하고 간결하게\",basis:\"내일 행사 전날 기대감 분산 조건\",cond:()=>true},\n  {id:\"wrap\",icon:\"✅\",shortTitle:\"마무리 3~5분: 체크아웃\",when:\"수업 마지막 3~5분\",signal:\"마무리 시점 — 어느 조건에서든 권장\",action:\"'오늘 가장 기억에 남는 것 하나만' → 손들기 또는 한 줄 적기\",basis:\"점검 필요형 이상 조건 — 이해도 즉시 확인\",cond:c=>c.riskScore>=50}\n];\n\n/* ── calcRisk (excludedFactors 매개변수 추가) ── */\nfunction calcRisk(data, excludedFactors=null){\n  const excludeSet=excludedFactors instanceof Set?excludedFactors:new Set();\n  let wSum=0,wTotal=0;const det=[];\n  for(const v of RV){\n    if(excludeSet.has(v.id))continue;  // 제외된 변수는 계산에서 빠짐\n    const sc=v.scorer(data),co=sc*v.weight;\n    wSum+=co;wTotal+=v.weight;\n    det.push({...v,score:parseFloat(sc.toFixed(3)),contribution:parseFloat(co.toFixed(3))});\n  }\n  const score=wTotal>0?Math.min(100,Math.round((wSum/wTotal)*100)):0;\n  const level=RL.find(l=>score<l.max);\n  const top=[...det].sort((a,b)=>b.contribution-a.contribution);\n  const ctx={riskScore:score,period:data.currentPeriod?.period??0,prevSubject:data.currentPeriod?.prevLesson?.subject??\"\",isAfterLunch:data.currentPeriod?.isAfterLunch??false,kcal:data.meal?.estimatedCalories??0};\n  const cps=CP.filter(c=>c.cond(ctx));\n  return{riskScore:score,level,topFactors:top,allFactors:det,checkpoints:cps};\n}\n\n/* ── 영향 요인 제외 상태 + 재계산 ── */\nlet _excludedFactors=new Set();\nfunction excludeFactor(id){\n  _excludedFactors.add(id);\n  const rr=calcRisk(D,_excludedFactors);\n  renderDash(rr,D);\n}\nfunction resetFactors(){\n  _excludedFactors.clear();\n  const rr=calcRisk(D,_excludedFactors);\n  renderDash(rr,D);\n  showToast('영향 요인이 모두 복원되었습니다');\n}\n\n/* ── animateCompassNeedle ──\n   회전 각도 매핑:\n   - 위험도 0% (안전) → +90° (우측, GOOD)\n   - 위험도 50% (중간) → 0° (위쪽)\n   - 위험도 100% (위험) → -90° (좌측, POOR)\n   공식: angle = 90 - target × 1.8\n   CSS transition으로 부드럽게 회전\n*/\nfunction animThermo(target, color){\n  const needle=document.getElementById('compass-needle');\n  if(!needle)return;\n  const targetAngle=target*1.8-90;\n  // CSS transition은 transform 속성 보간 시 회전 중심이 어긋나 침이 축에서 떨어져 보임.\n  // → JS로 매 프레임 rotate(각도 100 100)를 직접 갱신해 항상 정확히 중심축 기준으로 회전.\n  if(needle._raf)cancelAnimationFrame(needle._raf);\n  const m=(needle.getAttribute('transform')||'').match(/rotate\\(\\s*(-?[\\d.]+)/);\n  const from=m?parseFloat(m[1]):-90;\n  const dur=900, t0=performance.now(), delta=targetAngle-from;\n  const ease=t=>1-Math.pow(1-t,3); // ease-out cubic (오버슈트 없음)\n  const step=now=>{\n    const t=Math.min((now-t0)/dur,1);\n    const a=from+delta*ease(t);\n    needle.setAttribute('transform',`rotate(${a.toFixed(2)} 100 100)`);\n    if(t<1){needle._raf=requestAnimationFrame(step);}\n    else{needle.setAttribute('transform',`rotate(${targetAngle.toFixed(2)} 100 100)`);needle._raf=null;}\n  };\n  needle._raf=requestAnimationFrame(step);\n  // rAF가 로딩 중 누락돼도 최종 각도는 보장\n  setTimeout(()=>{if(needle._raf===null)return;cancelAnimationFrame(needle._raf);needle._raf=null;needle.setAttribute('transform',`rotate(${targetAngle.toFixed(2)} 100 100)`);},dur+300);\n}\n\n/* ── AI 브리핑: 오늘 조건을 읽고 한 줄 실행 조언 생성 ── */\nfunction buildBrief(rr,data){\n  const lvl=rr.level.label;\n  const top=(rr.topFactors||[]).filter(f=>f.score>0.35);\n  const period=data.currentPeriod?.period;\n  const prev=data.currentPeriod?.prevLesson?.subject;\n  const subj=data.currentPeriod?.subject;\n  const temp=data.weather?.temperature;\n  const tipById={\n    period:`점심 직후 <b>${period}교시<\u002Fb>라 집중이 풀리기 쉬운 시간대입니다. <b>도입 1~2분을 가볍게<\u002Fb> 열어 주의를 모으는 것이 좋습니다.`,\n    prevSubject:`<b>${prev} 직후<\u002Fb>라 아직 수업 모드 전환이 덜 됐을 수 있습니다. <b>첫&nbsp;1분은 차분히<\u002Fb> 호흡을 맞춰 ${subj} 수업을 시작하는 것이 좋습니다.`,\n    academicLevel:`학급 성취 편차가 있는 편입니다. <b>핵심 발문은 한 번 더 풀어<\u002Fb> 설명하면 참여가 안정됩니다.`,\n    calendar:`전날 행사 여운으로 들뜸이 보일 수 있습니다. <b>도입에서 오늘 목표를 또렷이<\u002Fb> 짚어 주는 것이 좋습니다.`,\n    studentCount:`학급 규모 부담이 적은 날이라 <b>개별 발문을 적극 활용<\u002Fb>하기 좋습니다.`,\n    weather:`기온 <b>${temp}°C<\u002Fb>로 다소 덥습니다. <b>중반에 30초 환기 포인트<\u002Fb>를 미리 잡아 두면 좋습니다.`,\n    physicalFitness:`체력 부담 구간이 있습니다. <b>활동과 정적 과제를 번갈아<\u002Fb> 배치하면 집중이 유지됩니다.`,\n    meal:`급식 영향은 크지 않습니다. <b>평소 흐름대로<\u002Fb> 진행하셔도 좋습니다.`\n  };\n  if(lvl===\"매우 안정\"||lvl===\"안정\") return `오늘은 <b>참여에 유리한 환경<\u002Fb>입니다. 준비하신 흐름대로 진행하셔도 무리가 없습니다.`;\n  if(top.length===0) return `눈에 띄는 부담 요인은 없습니다. <b>평소 흐름대로<\u002Fb> 편하게 진행하셔도 좋습니다.`;\n  let msg=tipById[top[0].id]||`${top[0].label} 영향이 두드러집니다. 도입에서 한 번 더 호흡을 맞춰 주시는 것이 좋습니다.`;\n  // 부가 요인: 요인 이름을 구체적 표현으로 풀어 자연스럽게\n  const secById={\n    period:`점심 직후 <b style=\"color:#6D28D9\">${period}교시<\u002Fb>`,\n    prevSubject:`<b style=\"color:#6D28D9\">${prev} 직후<\u002Fb>`,\n    weather:`<b style=\"color:#6D28D9\">기온(${temp}°C)<\u002Fb>`,\n    academicLevel:`<b style=\"color:#6D28D9\">학급 성취 편차<\u002Fb>`,\n    calendar:`<b style=\"color:#6D28D9\">전날 행사<\u002Fb>`,\n    studentCount:`<b style=\"color:#6D28D9\">학급 규모<\u002Fb>`,\n    physicalFitness:`<b style=\"color:#6D28D9\">체력 부담<\u002Fb>`,\n    meal:`<b style=\"color:#6D28D9\">급식<\u002Fb>`\n  };\n  if(top[1]&&tipById[top[1].id]&&top.length>=2){\n    const sec=secById[top[1].id]||`<b style=\"color:#6D28D9\">${top[1].label}<\u002Fb>`;\n    msg+=` <span style=\"font-weight:600\">${sec} 영향도 함께 작용하니 참고하시면 좋습니다.<\u002Fspan>`;\n  }\n  return msg;\n}\nfunction renderAiBrief(rr,data){\n  const wrap=document.getElementById('ai-brief');\n  const txt=document.getElementById('ai-brief-text');\n  const badge=document.getElementById('risk-ai-badge');\n  if(!wrap||!txt)return;\n  const final=buildBrief(rr,data)+` <span style=\"font-weight:700;color:#6D28D9;white-space:nowrap\">수업 파이팅하세요! („• ᴗ •„)/<\u002Fspan>`;\n  wrap.classList.add('thinking');\n  txt.innerHTML='오늘 조건을 분석하고 있습니다 <span class=\"ai-brief-dots\"><i><\u002Fi><i><\u002Fi><i><\u002Fi><\u002Fspan>';\n  if(badge)badge.classList.add('analyzing');\n  setTimeout(()=>{\n    wrap.classList.remove('thinking');\n    txt.innerHTML=final;\n    if(badge)badge.classList.remove('analyzing');\n  },950);\n}\n\n/* ── AI 분석 과정 설명 모달 ── */\nfunction openAiExplain(){\n  const rr=calcRisk(D,_excludedFactors);\n  const top=(rr.topFactors||[]).filter(f=>f.score>0).slice(0,3);\n  const totW=RV.reduce((a,x)=>a+x.weight,0);\n  const usedCount=rr.allFactors.length;\n  const briefTxt=buildBrief(rr,D);\n  const fchips=top.map(f=>`<span class=\"aix-fchip\">${f.label}<span class=\"fw\">가중치 ${f.weight}<\u002Fspan><\u002Fspan>`).join('');\n  const topName=top[0]?top[0].label:'복합 요인';\n  document.getElementById('aix-body').innerHTML=`\n    <div class=\"aix-hero\">\n      <div class=\"aix-orb\"><svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M12 1.5 L13.7 8.9 L21 11 L13.7 13.1 L12 22.5 L10.3 13.1 L3 11 L10.3 8.9 Z\" fill=\"#fff\"/><path d=\"M19 3 L19.75 5.4 L22 6 L19.75 6.6 L19 9.4 L18.25 6.6 L16 6 L18.25 5.4 Z\" fill=\"#fff\" opacity=\".88\"/><\u002Fsvg><\u002Fdiv>\n      <div>\n        <div class=\"aix-h-t\">AI는 이렇게 분석했습니다<\u002Fdiv>\n        <div class=\"aix-h-s\">데이터 수집 → 점수화 → 종합 → 브리핑<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <p class=\"aix-lead\">위 브리핑은 사람이 미리 써둔 문장이 아니라, AI가 <b>오늘 ${usedCount}개 변인<\u002Fb>을 실시간으로 읽고 만든 결과입니다. 4단계로 만들어집니다.<\u002Fp>\n\n    <div class=\"aix-steps\">\n      <div class=\"aix-step\">\n        <div class=\"aix-num\">1<\u002Fdiv>\n        <div class=\"aix-step-t\">공공데이터를 모읍니다<\u002Fdiv>\n        <div class=\"aix-step-b\">오늘 이 학급의 <b>시간표·급식·날씨·학사일정·학급 정보<\u002Fb>를 NEIS·기상청·학교알리미에서 실시간으로 가져옵니다. 추측이 아니라 실제 수치입니다.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"aix-step\">\n        <div class=\"aix-num\">2<\u002Fdiv>\n        <div class=\"aix-step-t\">변인마다 학술 근거로 점수를 매깁니다<\u002Fdiv>\n        <div class=\"aix-step-b\">각 변인이 참여를 얼마나 어렵게 하는지 0~1로 환산하고, 검증된 연구 가중치를 곱합니다. 오늘 가장 크게 작용한 변인은 다음과 같습니다.<\u002Fdiv>\n        <div class=\"aix-chips\">${fchips||'<span class=\"aix-fchip\">두드러진 요인 없음<\u002Fspan>'}<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"aix-step\">\n        <div class=\"aix-num\">3<\u002Fdiv>\n        <div class=\"aix-step-t\">합산해 위험도를 계산합니다<\u002Fdiv>\n        <div class=\"aix-step-b\">${usedCount}개 변인의 점수를 가중치(총 ${totW})로 합산해 <b>참여 위험도 ${rr.riskScore}%<\u002Fb>, 단계는 <b>‘${rr.level.label}’<\u002Fb>로 나왔습니다.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"aix-step\">\n        <div class=\"aix-num\">4<\u002Fdiv>\n        <div class=\"aix-step-t\">가장 중요한 한 가지를 골라 조언합니다<\u002Fdiv>\n        <div class=\"aix-step-b\">여러 요인 중 영향이 가장 큰 <b>‘${topName}’<\u002Fb>에 초점을 맞춰, 지금 바로 실행할 수 있는 한 줄로 정리합니다.<\u002Fdiv>\n        <div class=\"aix-quote\">${briefTxt}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"aix-foot\">\n      <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M12 2L4 6v6c0 5 3.4 8.5 8 10 4.6-1.5 8-5 8-10V6l-8-4z\" fill=\"#16A34A\"/><path d=\"M9.5 12l2 2 4-4.5\" stroke=\"#fff\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/><\u002Fsvg>\n      <span>모든 판단의 근거가 되는 원본 수치는 ‘오늘 수업 조건’에서 직접 확인할 수 있습니다. AI는 <b style=\"color:#166534\">검증된 데이터와 학술 근거만<\u002Fb> 사용하며, 지어내지 않습니다.<\u002Fspan>\n    <\u002Fdiv>`;\n  openM('aix-m');\n}\n\n/* ── renderDash ── */\nfunction renderDash(rr,data){\n  const{riskScore,level,topFactors,allFactors,checkpoints}=rr;\n  const {color,bg,icon,iconBg,adv,label}=level;\n\n  // Info bar\n  _t('#ib-subj',data.currentPeriod?.subject??\"--\");\n  _t('#ai-trust-per',`${data.currentPeriod?.period??\"5\"}`);\n  _t('#ib-per',`${data.currentPeriod?.period??\"-\"}교시`);\n\n  // Risk section\n  _count('#risk-score',riskScore,1000);\n  animThermo(riskScore,color);\n\n  // 온도 숫자와 °C 단위에도 위험 단계 색상 적용 (직관성 보강)\n  const scoreEl=document.getElementById('risk-score');\n  if(scoreEl)scoreEl.style.color=color;\n  const symEl=document.querySelector('.score-pct-sym');\n  if(symEl)symEl.style.color=color;\n\n  const badge=document.getElementById('risk-lvl-badge');\n  if(badge){badge.textContent=label;badge.style.background=bg;badge.style.borderColor=level.border;badge.style.color=color}\n\n  const iw=document.getElementById('risk-icon-wrap');\n  if(iw){iw.textContent=icon;iw.style.background=iconBg}\n\n  const msg=document.getElementById('risk-msg');\n  if(msg){\n    // 위험 기여 상위 2~3개 변수 추출 (영향이 의미 있는 것만)\n    const sigVars=topFactors.filter(f=>f.score>0.4).slice(0,3);\n    const varList=sigVars.length>0?`(${sigVars.map(v=>v.label).join(', ')}) `:'';\n    let dynamicMsg;\n    switch(level.label){\n      case \"매우 안정\": dynamicMsg=\"수업 진행에 매우 좋은 조건입니다.\"; break;\n      case \"안정\":      dynamicMsg=\"안정적인 환경입니다. 평소대로 진행하세요.\"; break;\n      case \"점검 필요\": dynamicMsg=`${varList}주의할 지점이 일부 있습니다.`; break;\n      case \"주의 필요\": dynamicMsg=`${varList}부담 요인이 겹쳐 있습니다.`; break;\n      case \"개입 필요\": dynamicMsg=`${varList}컨디션 관리가 필요한 환경입니다.`; break;\n      default:          dynamicMsg=adv.replace('\\n',' ');\n    }\n    msg.innerHTML=dynamicMsg;\n  }\n\n  // Factor grid\n  renderFactorGrid(topFactors);\n\n  // AI 브리핑 (실시간 분석 → 한 줄 실행 조언)\n  renderAiBrief(rr,data);\n\n  // Conditions\n  renderConditions(data);\n  // 데이터 출처 토글 상태에 따라 행 표시/숨김\n  if(typeof applyConditionVisibility==='function')applyConditionVisibility();\n\n  // Advisor card (personalized) — home tab\n  renderAdvisorCard(checkpoints);\n  // Full strategy list — strategy tab\n  renderStratFull(checkpoints);\n\n  // RL modal\n  renderRlGrid();\n\n  // Records\n  renderTodayOther(data.periodComments??[]);\n  renderMyRec();\n}\n\n/* ── Factor Grid ── */\nlet _curFdp=null;\nfunction renderFactorGrid(factors){\n  const el=document.getElementById('factor-grid');if(!el)return;\n  el.innerHTML='';\n  factors.forEach((f,i)=>{\n    const div=document.createElement('div');div.className='factor-chip';\n    div.innerHTML=`<div class=\"fc-rank\" style=\"background:${RANK_COLORS[i]}\">${i+1}<\u002Fdiv>\n      <div class=\"fc-name\">${f.label}<\u002Fdiv>\n      <div class=\"fc-weight\">${f.weight}<\u002Fdiv>\n      <button class=\"fc-exclude\" title=\"이 요인 제외\" aria-label=\"제외\">✕<\u002Fbutton>`;\n    div.onclick=(e)=>{\n      if(e.target.classList.contains('fc-exclude'))return;\n      toggleFdp(f,div);\n    };\n    div.querySelector('.fc-exclude').onclick=(e)=>{\n      e.stopPropagation();\n      excludeFactor(f.id);\n    };\n    el.appendChild(div);\n  });\n}\n\nfunction toggleFdp(f,chip){\n  const p=document.getElementById('fdp');if(!p)return;\n  if(_curFdp===f.id&&!p.hidden){\n    p.hidden=true;_curFdp=null;\n    document.querySelectorAll('.factor-chip').forEach(c=>c.classList.remove('active'));\n    return;\n  }\n  _curFdp=f.id;\n  document.querySelectorAll('.factor-chip').forEach(c=>c.classList.remove('active'));\n  chip.classList.add('active');\n  const lvl=f.score>=.7?'높음':f.score>=.4?'중간':'낮음';\n  const hv=(f.id==='weather'&&D.weather?.hvacNote)?`<div class=\"hvac-box\"><p class=\"hvac-t\">❄ 냉난방 고려<\u002Fp><p class=\"hvac-b\">${D.weather.hvacNote}<\u002Fp><\u002Fdiv>`:'';\n  p.innerHTML=`<div class=\"fdp-top\"><span class=\"fdp-label\"># ${f.label}<\u002Fspan><button class=\"fdp-close\" onclick=\"hideFdp()\">✕<\u002Fbutton><\u002Fdiv>\n    <div class=\"fdp-basis\">${f.basis}<\u002Fdiv>\n    <dl class=\"fdp-meta\">\n      <dt>출처<\u002Fdt><dd>${f.source}<\u002Fdd>\n      <dt>영향 수준<\u002Fdt><dd>${lvl} (${(f.score*100).toFixed(0)}점)<\u002Fdd>\n      <dt>기여도<\u002Fdt><dd>+${f.contribution.toFixed(1)}pt<\u002Fdd>\n      <dt>가중치<\u002Fdt><dd>${f.weight}/${RV.reduce((a,x)=>a+x.weight,0)}<\u002Fdd>\n    <\u002Fdl>${hv}`;\n  p.hidden=false;\n  p.scrollIntoView({behavior:'smooth',block:'nearest'});\n}\nfunction hideFdp(){_curFdp=null;const p=document.getElementById('fdp');if(p)p.hidden=true;document.querySelectorAll('.factor-chip').forEach(c=>c.classList.remove('active'))}\n\n/* ── Conditions ── */\nfunction renderConditions(data){\n  const el=document.getElementById('cond-grid');if(!el)return;\n  const conds=[\n    {id:'period',icon:'⏰',label:'교시',value:`점심 직후 ${data.currentPeriod?.period}교시`,tag:'h',src:'NEIS'},\n    {id:'meal',icon:'🍽',label:'급식',value:`${data.meal?.estimatedCalories}kcal`,tag:'h',src:'NEIS'},\n    {id:'prevSubject',icon:'🎽',label:'이전 수업',value:'체육 직후',tag:'h',src:'NEIS'},\n    {id:'academicLevel',icon:'📊',label:'성취도',value:data.classProfile?.academicAchievementLevel??\"보통\",tag:'m',src:'학교알리미'},\n    {id:'calendar',icon:'📅',label:'학사일정',value:'전날 행사 있음',tag:'m',src:'NEIS'},\n    {id:'studentCount',icon:'👥',label:'학급당 학생수',value:`${data.classProfile?.studentCount}명`,tag:'l',src:'학교알리미'},\n    {id:'weather',icon:'☁️',label:'날씨',value:`${data.weather?.temperature}°C / DI ${data.weather?.discomfortIndex}`,tag:'m',src:'기상청'},\n    {id:'physicalFitness',icon:'💪',label:'체력',value:data.classProfile?.physicalFitnessLevel??\"보통\",tag:'m',src:'학교알리미 PAPS'}\n  ];\n  const tagLabel={'h':'높음','m':'보통','l':'낮음'};\n  const tagCls={'h':'tag-h','m':'tag-m','l':'tag-l'};\n  el.innerHTML=conds.map(c=>`<div class=\"cond-row\" onclick=\"openCondDetail('${c.id}')\" title=\"원본 데이터 보기\">\n    <div class=\"cond-icon\">${c.icon}<\u002Fdiv>\n    <div class=\"cond-texts\">\n      <div class=\"cond-label\">${c.label}<span class=\"cond-src\">${c.src}<\u002Fspan><\u002Fdiv>\n      <div class=\"cond-value\">${c.value}<\u002Fdiv>\n      <span class=\"cond-tag ${tagCls[c.tag]}\">${tagLabel[c.tag]}<\u002Fspan>\n    <\u002Fdiv>\n    <span class=\"cond-go\">›<\u002Fspan>\n  <\u002Fdiv>`).join('');\n}\n\n/* ── Condition raw-data detail ── */\nfunction condInfo(D){\n  const di=D.weather?.discomfortIndex;\n  return {\n    period:{icon:'⏰',title:'교시 · 시간표',src:'NEIS 시간표 · 교사 제공',rows:[\n      ['현재 교시',`${D.currentPeriod?.period}교시 ${D.currentPeriod?.subject}`],\n      ['시간대','점심 직후 (오후)'],\n      ['직전 교시',`${D.currentPeriod?.prevLesson?.period}교시 ${D.currentPeriod?.prevLesson?.subject}`],\n      ['흐름','4교시 체육 → 5교시 국어 (현재, 점심 후)']\n    ],note:'오후 교시일수록 누적 인지 피로 + 점심 직후 졸음(post-lunch dip)이 겹칩니다. (Monk 2005)'},\n    meal:{icon:'🍽',title:'급식',src:'5월 급식 가정통신문 (NEIS)',rows:[\n      ['메뉴','혼합15곡잡곡밥 · 뉴욕곰탕 · 하와이안찹스테이크 · 치즈새우구이 · 보영쫄면 · 쑥갓두부무침 · 배추김치 · 스승의날케익'],\n      ['총 열량','1,143.32 kcal'],\n      ['앱 반영값',`${D.meal?.estimatedCalories} kcal (고열량)`],\n      ['제공 시점','점심 (5교시 직전)']\n    ],note:'단순 칼로리는 약한 지표입니다. 주된 점심-인지 효과(post-lunch dip)는 \\u2018교시\\u2019 변인에서 다루며, 급식은 가중치 1로 미세 보정만 합니다.'},\n    prevSubject:{icon:'🎽',title:'직전 수업',src:'NEIS 시간표',rows:[\n      ['직전 교시',`${D.currentPeriod?.prevLesson?.period}교시 ${D.currentPeriod?.prevLesson?.subject}`],\n      ['현재 교시',`${D.currentPeriod?.period}교시 ${D.currentPeriod?.subject}`],\n      ['전환 유형','체육 → 국어 (활동 → 정적 수업)']\n    ],note:'체육 직후는 신체 피로보다 \\u2018정서적 각성·교실 모드 전환\\u2019 부담이 핵심입니다. (Skulmowski 2023)'},\n    academicLevel:{icon:'📊',title:'학업 성취도',src:'교과별 학업성취사항 CSV',rows:[\n      ['과목','국어'],\n      ['전교 평균','약 81점'],\n      ['성취 수준',D.classProfile?.academicAchievementLevel??'보통'],\n      ['기준 학년도','2025학년도']\n    ],note:'학업 성취도는 행동·정서·인지 참여를 예측하는 정적 변수로, 학급의 기저 위험 수준을 결정합니다. (Tian et al. 2017)'},\n    calendar:{icon:'📅',title:'학사일정',src:'NEIS 학사일정 CSV',rows:[\n      ['전날 (05/13)',(D.calendar?.yesterdayEvents??[]).join(' · ')||'없음'],\n      ['당일 (05/14)','스승의날'],\n      ['내일 (05/15)',D.calendar?.tomorrowEvent??'없음'],\n      ['다음 시험',D.calendar?.daysToNextExam==null?'없음 (null)':`D-${D.calendar.daysToNextExam}`]\n    ],note:'행사 전후로는 교실 분위기가 분산되기 쉽습니다. 행사 후 효과는 학술 근거가 빈약한 영역으로, 현장 직관 기반 추정입니다.'},\n    studentCount:{icon:'👥',title:'학급당 학생수',src:'학교알리미 JSON',rows:[\n      ['학급당 평균','22.9명'],\n      ['적용 인원',`${D.classProfile?.studentCount}명 (반올림)`],\n      ['전국 중등 평균','25.7명 (OECD 2025)']\n    ],note:'학급 크기는 학업 직접 효과보다 교사-학생 상호작용 질에 영향을 줍니다. (Bassok 2014)'},\n    weather:{icon:'☁️',title:'날씨',src:'기상청 단기예보 (성북구)',rows:[\n      ['기온','최저 16.5°C / 최고 31.7°C'],\n      ['습도','23.3 ~ 77.9%'],\n      ['풍속','최대 3m/s · 순간 6m/s'],\n      ['강수','없음'],\n      ['미세먼지·오존','보통'],\n      ['앱 반영값',`외부기온 약 ${D.weather?.temperature}°C · 불쾌지수 ${di}`]\n    ],note:'외부 기온 기반 추정값입니다. 실내 환기 제약·CO₂ 누적 등 매개 효과는 본 모델에 반영되지 않은 한계입니다.'},\n    physicalFitness:{icon:'💪',title:'학급 체력',src:'학교알리미 PAPS',rows:[\n      ['PAPS 등급',D.classProfile?.physicalFitnessLevel??'보통'],\n      ['측정 단위','학급 평균'],\n      ['참고','한국 청소년 체력 OECD 최하위 (2019)']\n    ],note:'체력 수준은 주의 통제·작업기억 등 실행기능을 예측합니다. 단, 학급 평균 단위 외삽은 한계로 인정합니다. (Donnelly 2016)'}\n  };\n}\nfunction openCondDetail(id){\n  const info=condInfo(D)[id];if(!info)return;\n  let rf=null;\n  try{rf=calcRisk(D,_excludedFactors).allFactors.find(f=>f.id===id);}catch(e){}\n  const totW=RV.reduce((a,x)=>a+x.weight,0);\n  const rowsHtml=info.rows.map(r=>`<div class=\"cd-row\"><div class=\"cd-k\">${r[0]}<\u002Fdiv><div class=\"cd-v\">${r[1]}<\u002Fdiv><\u002Fdiv>`).join('');\n  const modelHtml=rf?`<div class=\"cd-sec-t\">위험도 반영<\u002Fdiv>\n    <div class=\"cd-model\">\n      <div class=\"cd-chip\"><div class=\"cd-chip-k\">가중치<\u002Fdiv><div class=\"cd-chip-v\">${rf.weight}/${totW}<\u002Fdiv><\u002Fdiv>\n      <div class=\"cd-chip\"><div class=\"cd-chip-k\">변인 점수<\u002Fdiv><div class=\"cd-chip-v\">${(rf.score*100).toFixed(0)}<\u002Fdiv><\u002Fdiv>\n      <div class=\"cd-chip\"><div class=\"cd-chip-k\">기여도<\u002Fdiv><div class=\"cd-chip-v\">+${rf.contribution.toFixed(1)}<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>`:`<div class=\"cd-note\" style=\"margin-top:14px\">이 변인의 데이터 출처가 현재 꺼져 있어 위험도 계산에서 제외되었습니다.<\u002Fdiv>`;\n  document.getElementById('cond-detail').innerHTML=`\n    <div class=\"cd-head\">\n      <div class=\"cd-ic\">${info.icon}<\u002Fdiv>\n      <div><div class=\"cd-title\">${info.title}<\u002Fdiv><div class=\"cd-src\">📡 ${info.src}<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"cd-sec-t\">원본 데이터<\u002Fdiv>\n    ${rowsHtml}\n    ${info.note?`<div class=\"cd-note\">${info.note}<\u002Fdiv>`:''}\n    ${modelHtml}`;\n  openM('cond-m');\n}\n\n/* ── Strategy render (home: flat list, full: accordion) ── */\nfunction renderStratHome(cps){\n  const el=document.getElementById('strat-home');if(!el)return;\n  el.innerHTML='';\n  cps.slice(0,3).forEach((cp,i)=>{\n    const div=document.createElement('div');div.className='strat-item';\n    div.innerHTML=`<div class=\"strat-num\">${i+1}<\u002Fdiv>\n      <div class=\"strat-icon\">${cp.icon}<\u002Fdiv>\n      <div style=\"flex:1;min-width:0\"><div class=\"strat-title\">${cp.shortTitle}<\u002Fdiv><div class=\"strat-when\">${cp.when}<\u002Fdiv><\u002Fdiv>\n      <div class=\"strat-arr\">›<\u002Fdiv>`;\n    div.onclick=()=>{goTab('strategy')};\n    el.appendChild(div);\n  });\n}\n\nfunction renderStratFull(cps){\n  const el=document.getElementById('strat-full');if(!el)return;\n  el.innerHTML='';\n  cps.forEach((cp,i)=>{\n    const div=document.createElement('div');div.className='si-expand';\n    div.innerHTML=`<div class=\"si-expand-hd\" onclick=\"toggleSi(this)\">\n      <div class=\"si-num-e\">${i+1}<\u002Fdiv>\n      <div class=\"si-expand-texts\">\n        <div class=\"si-expand-when\">${cp.icon} ${cp.when}<\u002Fdiv>\n        <div class=\"si-expand-title\">${cp.shortTitle}<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"si-chev\">›<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"si-det\">\n      <div class=\"si-det-inner\">\n        <div class=\"si-signal\"><em>상황:<\u002Fem> ${cp.signal}<\u002Fdiv>\n        <div class=\"si-action\">${cp.action}<\u002Fdiv>\n        <span class=\"si-basis-tag\">${cp.basis}<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>`;\n    el.appendChild(div);\n  });\n}\n\nfunction toggleSi(hd){\n  const item=hd.parentElement;\n  const chev=hd.querySelector('.si-chev');\n  const det=item.querySelector('.si-det');\n  // close others\n  document.querySelectorAll('.si-expand.open').forEach(s=>{if(s!==item){s.classList.remove('open');s.querySelector('.si-chev').style.transform=''}});\n  const open=item.classList.toggle('open');\n  if(chev)chev.style.transform=open?'rotate(90deg)':'';\n}\n\n/* ── RL Modal ── */\nfunction renderRlGrid(){\n  const el=document.getElementById('rl-grid');if(!el)return;\n  el.innerHTML=RL.map(l=>`<div class=\"rl-card\" style=\"background:${l.bg};border-color:${l.border}\">\n    <div class=\"rl-hd\"><span class=\"rl-badge\" style=\"background:${l.color};color:#fff\">${l.icon} ${l.label}<\u002Fspan><span class=\"rl-range\">${l.max===40?'0~39':l.max===60?'40~59':l.max===80?'60~79':'80~100'}%<\u002Fspan><\u002Fdiv>\n    <p class=\"rl-desc\">${l.adv.replace('\\n',' ')}<\u002Fp>\n    <p class=\"rl-signs\"><strong>조건:<\u002Fstrong> ${l.signs}<\u002Fp>\n    <p class=\"rl-signs\" style=\"margin-top:2px\"><strong>권장:<\u002Fstrong> ${l.approach}<\u002Fp>\n  <\u002Fdiv>`).join('');\n}\n\n/* ── Method Modal ── */\nfunction openMethodModal(){\n  const rr=calcRisk(D);\n  const sorted=[...rr.allFactors].sort((a,b)=>b.contribution-a.contribution);\n  const maxC=sorted[0].contribution;\n  const sc=s=>s>=.7?'#DC2626':s>=.4?'#D97706':'#16A34A';\n  const tb=document.getElementById('method-table');\n  if(tb){tb.innerHTML=`<div class=\"mrow mhdr\"><span>변인<\u002Fspan><span style=\"text-align:center\">가중치<\u002Fspan><span style=\"text-align:center\">점수<\u002Fspan><span>기여도<\u002Fspan><\u002Fdiv>`\n    +sorted.map(f=>`<div class=\"mrow\"><span class=\"mv-n\">${f.label}<\u002Fspan><span class=\"mv-w\">${f.weight}<\u002Fspan><span class=\"mv-s\" style=\"color:${sc(f.score)}\">${(f.score*100).toFixed(0)}<\u002Fspan><div class=\"mv-bw\"><div class=\"mv-bar\" style=\"width:${Math.round(f.contribution/maxC*100)}%\"><\u002Fdiv><span class=\"mv-c\">${f.contribution.toFixed(1)}<\u002Fspan><\u002Fdiv><\u002Fdiv>`).join('')\n    +`<div style=\"font-size:11px;color:var(--g400);margin-top:7px;text-align:right\">합계 ${rr.allFactors.reduce((a,f)=>a+f.contribution,0).toFixed(2)} / ${RV.reduce((a,x)=>a+x.weight,0)} × 100 = <strong style=\"color:#1D4ED8\">${rr.riskScore}%<\u002Fstrong><\u002Fdiv>`}\n  openM('method-m');\n}\n\n/* ── Records ── */\nfunction renderTodayOther(cs){\n  const el=document.getElementById('today-other');if(!el)return;\n  const sc=s=>s>=4?'#16A34A':s<=2?'#DC2626':'var(--blue-dk)';\n  el.innerHTML=`<div class=\"rec-list\">`+cs.map(c=>`<div class=\"rec-item\"><div class=\"rec-dot\" style=\"background:${sc(c.condition)}\">${c.condition}<\u002Fdiv><div class=\"rec-body\"><div class=\"rec-meta\">${c.period}교시 ${c.subject} · ${c.teacher} · ${c.time}<\u002Fdiv><div class=\"rec-label\">${c.conditionLabel}<\u002Fdiv><div class=\"rec-cmt\">\"${c.comment}\"<\u002Fdiv><\u002Fdiv><\u002Fdiv>`).join('')+`<\u002Fdiv>`;\n}\n\nfunction renderMyRec(){\n  const el=document.getElementById('my-rec');if(!el)return;\n  let h=[];try{h=JSON.parse(localStorage.getItem('suop_rec6')||'[]')}catch(e){}\n  if(!h.length){el.innerHTML='<div class=\"rec-empty\">📝 아직 기록이 없습니다<br>위 버튼을 눌러 첫 기록을 시작하세요.<\u002Fdiv>';return}\n  const sc=s=>s>=4?'#16A34A':s<=2?'#DC2626':'var(--blue-dk)';\n  el.innerHTML=`<div class=\"rec-list\">`+h.slice(0,20).map(r=>`<div class=\"rec-item\"><div class=\"rec-dot\" style=\"background:${sc(r.ac)}\">${r.ac}<\u002Fdiv><div><div class=\"rec-meta\">${r.date} · ${r.period}교시 ${r.subject} · 참여 위험도 ${r.risk}%<\u002Fdiv><div class=\"rec-label\">${r.cl}<\u002Fdiv>${r.note?`<div class=\"rec-cmt\">${r.note}<\u002Fdiv>`:''}<\u002Fdiv><\u002Fdiv>`).join('')+`<\u002Fdiv>`;\n}\n\n/* ── Record modal ── */\nlet _sc=null;const SCL=['','매우 산만','산만한 편','보통','집중된 편','매우 집중'];\nfunction selSc(btn){document.querySelectorAll('.scb').forEach(b=>b.classList.remove('sel'));btn.classList.add('sel');_sc=parseInt(btn.dataset.v,10)}\nfunction saveRecord(){\n  if(!_sc){showToast('컨디션 단계를 선택해주세요.');return}\n  const r={date:new Date().toISOString().slice(0,10),period:D.currentPeriod.period,subject:D.currentPeriod.subject,ac:_sc,cl:SCL[_sc],risk:calcRisk(D).riskScore,note:(document.getElementById('rec-ta')?.value??'').trim()};\n  try{const h=JSON.parse(localStorage.getItem('suop_rec6')||'[]');h.unshift(r);localStorage.setItem('suop_rec6',JSON.stringify(h))}catch(e){}\n  _sc=null;document.querySelectorAll('.scb').forEach(b=>b.classList.remove('sel'));\n  const ta=document.getElementById('rec-ta');if(ta)ta.value='';\n  closeM('rec-m');renderMyRec();showToast('기록이 저장되었습니다.');\n}\n\n/* ── AI 코파일럿 자유 입력 응답 풀 ──\n   환각(hallucination) 없이 키워드 매칭 기반 자연어 응답\n   매칭 패턴 × 다양한 변형으로 자연스러움 확보 */\n\nconst CHAT_PATTERNS=[\n  // 인사\n  {keys:['안녕','하이','hi','hello','반가워','반갑'],resp:[\n    \"안녕하세요 {{teacher}} 선생님 😊 오늘도 좋은 수업 되세요!\\n\\n현재 참여 위험도 53% (점검 필요형)입니다. 궁금하신 부분 있으면 위 버튼을 누르거나 직접 질문해주세요.\",\n    \"{{teacher}} 선생님, 반갑습니다! 수업 나침반입니다 🧭\\n\\n오늘은 5교시 국어 수업 직전이시네요. 도움이 필요한 부분 있으세요?\",\n    \"반갑습니다 {{teacher}} 선생님. 오늘도 함께 가요 😊\\n\\n오늘 학급 컨디션이나 추천 전략, 진도 등 무엇이든 물어보세요.\"\n  ]},\n  // 감사\n  {keys:['고마워','고맙','감사','땡큐','thanks','thank you'],resp:[\n    \"도움이 되셨다니 다행입니다 🙂 {{teacher}} 선생님!\\n\\n수업 후 피드백을 남겨주시면 다음 추천이 더 정확해져요.\",\n    \"별말씀을요 {{teacher}} 선생님. 좋은 수업 응원합니다!\\n\\n다른 궁금한 점 있으면 언제든 물어보세요.\"\n  ]},\n  // 작별\n  {keys:['잘가','잘 가','수고','이만','goodbye','bye'],resp:[\n    \"수고하셨습니다 {{teacher}} 선생님 🙌\\n\\n수업 끝나고 참여 위험도 진단 피드백 한 번만 남겨주시면 정말 큰 도움이 됩니다.\",\n    \"{{teacher}} 선생님, 오늘도 고생 많으셨어요. 좋은 하루 보내세요 😊\"\n  ]},\n  // 기분·격려\n  {keys:['힘들','지치','피곤하','짜증','우울','스트레스','괴로'],resp:[\n    \"{{teacher}} 선생님, 오늘도 정말 고생 많으셨어요.\\n\\n오늘 참여 위험도가 53% (점검 필요)로 학급 환경도 쉽지 않은 날입니다. 무리하지 마시고, 핵심 한 가지만 정리하고 가는 것도 좋습니다.\\n\\n💡 마무리 5분 — '오늘 한 일' 한 줄로 정리하면 수업도, 마음도 정리됩니다.\",\n    \"수업이 쉽지 않으셨군요 {{teacher}} 선생님. 모든 수업을 완벽하게 할 필요는 없습니다.\\n\\n오늘은 학생들과 함께 끝까지 간 것만으로도 충분합니다.\\n\\n수업 후 피드백 한 번 남겨주시면 다음 추천이 더 맞춰집니다.\"\n  ]},\n  // 칭찬·긍정\n  {keys:['좋아','좋네','좋아요','대박','멋지','훌륭','잘하'],resp:[\n    \"감사합니다 {{teacher}} 선생님 😊 더 도움이 되도록 발전해가겠습니다.\\n\\n계속해서 피드백을 누적해가면 추천 정확도가 학교·학년·교과별로 더 정교해집니다.\"\n  ]},\n\n  // ───── 도메인별 응답 ─────\n  {keys:['졸음','졸려','졸리','자네','잠'],resp:[\n    \"5교시 + 점심 직후(1,143kcal) 환경입니다 (post-lunch dip — Monk 2005).\\n\\n💡 {{teacher}} 선생님, 15분쯤 졸음이 시작되면:\\n• 짝과 30초 대화 ('방금 한 거 한 줄로 말하기')\\n• 또는 자세 환기 신호 ('어깨 한 번 돌려봅시다')\\n• 또는 확인 질문 1개 투입\\n\\n어느 쪽이든 1분 안에 끝나는 환기가 효과적입니다.\"\n  ]},\n  {keys:['집중','산만','떠들','시끄','소란'],resp:[\n    \"5교시 + 체육 직후라 정서적 각성·전환 부담이 있습니다.\\n\\n💡 도입 첫 1분에 '명확한 첫 활동'을 던지면 빠르게 모드 전환됩니다:\\n• 묵독 1분\\n• 핵심 질문 1개\\n• 짝 활동 (대화형)\\n\\n체육 후에는 '말보다 텍스트'가 효과적입니다, {{teacher}} 선생님.\"\n  ]},\n  {keys:['피로','피곤'],resp:[\n    \"체육 직후 + 점심 고열량(1,143kcal) + 전날 행사 — 피로 요인이 중첩됐습니다.\\n\\n📊 20~25분 구간이 집중 저점일 가능성이 높습니다.\\n\\n💡 그 시점에 활동 전환 한 번 끼워 넣으세요 {{teacher}} 선생님. 수업 흐름은 그대로 두고 30초 환기만으로도 효과 있습니다.\"\n  ]},\n  {keys:['진도','어디까지','어디부터','지난'],resp:[\n    \"📋 진도 기록 (NEIS 시간표 기반):\\n• 5/12(화) 3교시 국어: 78~84p 완료\\n• 5/14(오늘) 5교시 예정: 85~90p — 심화 독해 + 등장인물 심리\\n\\n💡 오늘은 참여 위험도 53%로 새 개념 한 번에 다 넣기보다 85~88p 집중 + 89~90p 다음 차시로 미루는 것을 권장.\\n\\n📝 이전 메모: 갈등 해결 과정 서술 표현 보충 필요.\"\n  ]},\n  {keys:['분위기','상태','어때','지금'],resp:[\n    \"{{teacher}} 선생님, 현재 참여 위험도 53% (점검 필요형) 입니다.\\n\\n📊 오늘 이미 진행된 수업:\\n• 1교시 수학: 집중된 편 (새 단원, 뒷자리 졸음)\\n• 2교시 영어: 보통 (졸음 4~5명, 활동 후 회복)\\n• 3교시 과학: 집중된 편 (모둠 실험)\\n\\n🔍 활동·과제에 빠르게 반응하는 학급입니다. 5교시도 짧은 활동 끼워 넣으면 효과적.\"\n  ]},\n  {keys:['몇명','학생수','인원','학급당'],resp:[\n    \"👥 현재 학급 (학교알리미 공시):\\n• 학생수: 23명 (한국 중등 평균 25.7명 — OECD 2025)\\n• 학업 성취도: 보통\\n• 체력: 보통\\n\\n학급 크기는 학업 직접 효과보다 교사-학생 상호작용 질에 영향을 줍니다 (Bassok 2014). 23명은 상호작용 관점에서 무난한 수준입니다.\"\n  ]},\n  {keys:['날씨','비','더위','추위','기온'],resp:[\n    \"☁️ 기상청 단기예보 기반:\\n• 외부기온 30°C\\n• 불쾌지수 64.7 (보통)\\n• 비 없음\\n\\n실내 매개효과(환기·CO₂)는 본 모델에 반영되지 않은 한계가 있습니다 {{teacher}} 선생님. 점심 후 환기 1~2분 추가하시면 인지 회복에 도움이 됩니다 (Harvard Healthy Buildings 2025).\"\n  ]},\n  {keys:['급식','점심','메뉴','밥'],resp:[\n    \"🍽 NEIS 급식정보 (오늘):\\n• 칼로리 1,143kcal (고열량)\\n• 점심 직후 효과: post-lunch dip 강화 가능\\n\\n다만 학술적으로 칼로리는 약한 지표입니다 (Müller 2021 CogniDo GI II). 주된 점심-인지 효과는 시간생리학(post-lunch dip)이며 '교시' 변인에서 다뤄집니다.\"\n  ]},\n  {keys:['시험','평가','중간','기말'],resp:[\n    \"📝 시험 일정 (NEIS 학사일정):\\n• 5/19(월) 중간고사 시작 — 오늘로부터 5일 후\\n• 5/22(목) 종료\\n\\n⚠ 시험 7일 이내라 모델에 시험 가중치 +0.40이 자동 적용되고 있습니다.\\n\\n💡 학술 근거 (Hembree 1988): 시험 직전 학생은 인지 자원이 시험 준비에 쏠려 일반 수업 주의가 분산됩니다. {{teacher}} 선생님, 정리·복습 위주를 권장합니다.\"\n  ]},\n  {keys:['행사','한마당','대회','이벤트'],resp:[\n    \"📅 학사일정 (NEIS):\\n• 어제(5/13) 동아리 활동·교통안전교육 — 분위기 영향 잔존\\n• 내일(5/15) 스포츠 한마당 — 학생 들뜸 가능\\n\\n💡 {{teacher}} 선생님, 도입부에 '오늘은 ○○만 깔끔히 정리하고 넘어갑니다'라고 한 줄 선언하면 잡담·들뜸 정리에 효과적입니다.\"\n  ]},\n  {keys:['위험도','참여 위험','점수','퍼센트'],resp:[\n    \"📊 현재 참여 위험도: 53% (점검 필요형)\\n\\n계산: Σ(score × weight) / Σweight × 100\\n= 23.34 / 45 × 100 ≈ 52%\\n\\n주요 영향 요인 (기여도 순):\\n• 직전 수업 (체육): 6.30pt\\n• 교시 (5교시): 5.76pt\\n• 학업 성취도 (보통): 3.50pt\\n• 학사일정 (어제 행사): 2.10pt\\n\\n각 변인은 영향 요인 카드에서 ✕로 제외 후 재계산할 수 있습니다.\"\n  ]},\n  {keys:['믿을','정확','신뢰','맞나','맞아'],resp:[\n    \"{{teacher}} 선생님, 솔직히 말씀드리면 본 참여 위험도는 '참고용 지표'입니다. 정답이 아닙니다.\\n\\n✅ 강점: 학술 근거 + 공공데이터 4종 실시간 연동 + XAI(설명 가능)\\n\\n⚠ 한계:\\n• 단일 변인 효과는 검증, 누적 시너지는 가설\\n• 환경 변인-수업 참여는 상관(correlation)이며 인과로 단정 불가\\n• 날씨는 외부 기온만 (실내 환기 미반영)\\n• PAPS 학급 평균 외삽 한계\\n• 행사 후 효과는 학술 빈약\\n\\n💡 {{teacher}} 선생님의 현장 관찰이 우선입니다. 모델은 보조 도구로 사용해주세요.\"\n  ]},\n  {keys:['참여 저하','disengagement','측정','뭐 측정','뭐를 측정','뭐예요','정확히 뭐','이게 뭐','이거 뭐'],resp:[\n    \"📌 <strong>참여 저하 위험 (Disengagement Risk)<\u002Fstrong>이란 — 오늘 학급 환경이 학생 참여를 어렵게 만들 가능성을 0~100% 척도로 추정한 값입니다.\\n\\n✓ 측정하는 것: 교실 환경 변인 누적도 (교시·날씨·학사일정·학급 크기 등)\\n✗ 측정하지 않는 것: 학생 개인의 집중도, 능력 평가, 학습 성취 예측, 교사 직무 부담\\n\\n📚 학술 출처: Fredricks et al. (2004) — Engagement 개념\\n\\n💡 {{teacher}} 선생님, 자세한 내용은 메인 카드의 ⓘ 버튼을 눌러주세요.\"\n  ]},\n  {keys:['도움말','사용법','어떻게 써','어떻게 사용'],resp:[\n    \"수업 나침반 사용 가이드 🧭\\n\\n1️⃣ 홈: 오늘 참여 위험도 + 영향 요인 + 마이크로 전략\\n2️⃣ 예측: 1~7교시 시간대별 위험도 추이\\n3️⃣ 전략: 조건별 전략 전체 + AI 코파일럿(여기)\\n4️⃣ 캘린더: 학사일정 + 리마인더 + AI 일정 비서\\n5️⃣ 피드백: 수업 후 기록 + 진단 정확성 평가\\n\\n💡 {{teacher}} 선생님, 가장 가치 있는 사용법은 매일 진단 정확성 평가와 카드 효과 평가를 1탭으로 남기는 것입니다. 시간이 흐를수록 추천이 정확해집니다.\"\n  ]},\n  {keys:['추천','전략','뭐 하','뭐할까','어떡'],resp:[\n    \"오늘 참여 위험도 53% (점검 필요) 기준 추천 마이크로 전략:\\n\\n🕐 수업 직전 (30초)\\n• 첫 멘트 머릿속 정리: '오늘 컨디션 좀 무겁죠? 차근차근 가봅시다'\\n\\n🕐 도입 첫 1분\\n• 묵독 1분 + 핵심 질문 1개 (체육 후 — 텍스트 우선)\\n• 따뜻한 톤 + 미소 한 번\\n\\n🕐 수업 중반 (20분 지점, 30초)\\n• 자세 환기 + 짝과 한 줄 말하기 60초\\n\\n📚 학술 근거: Hembree 1988, von der Embse 2018\"\n  ]},\n  {keys:['AI','인공지능','GPT','챗봇'],resp:[\n    \"본 AI는 별도 LLM API를 호출하지 않습니다. 환각 위험을 차단하기 위해 키워드 매칭 + 검증된 응답 풀로 작동합니다.\\n\\n✅ 모든 답변은 학술 출처와 공공데이터에 근거\\n✅ 모르는 것은 솔직히 모른다고 답변\\n✅ 한계는 정직하게 명시\\n\\n실제 서비스에서는 RAG 구조(학술 근거 풀 + 공공데이터)로 LLM 안전하게 활용할 계획입니다.\"\n  ]},\n  {keys:['누구','너 뭐','뭐야','이름','뭐니'],resp:[\n    \"안녕하세요 {{teacher}} 선생님! 저는 수업 나침반의 AI 코파일럿입니다 🧭\\n\\n선생님 옆에서 — 오늘 학급 참여 위험도, 영향 요인, 추천 전략, 진도, 학사일정 등을 정리해드립니다.\\n\\n환각(hallucination) 없이 학술 근거와 공공데이터를 기반으로만 답변합니다. 모르면 모른다고 말씀드려요.\"\n  ]}\n];\n\nfunction pickResponse(matched){\n  const arr=Array.isArray(matched.resp)?matched.resp:[matched.resp];\n  return arr[Math.floor(Math.random()*arr.length)];\n}\n\nconst DRES_POOL=[\n  \"흥미로운 질문이네요. 다만 정확한 답을 위해 좀 더 구체적으로 여쭤봐도 될까요?\\n\\n💡 도움 받기 좋은 키워드: 진도, 분위기, 추천 전략, 시험, 학사일정, 참여 위험도, 졸음 등\",\n  \"그 부분은 본 데모 응답 풀에 없는 질문입니다 (환각 방지를 위해 검증된 답변만 제공).\\n\\n위 preset 버튼을 활용하시거나, 키워드(진도/분위기/추천/시험 등)를 포함해서 다시 물어봐주세요.\",\n  \"정확히 이해되지 않았습니다. 다시 한번 풀어서 말씀해주실 수 있나요?\\n\\n또는 위 6개 preset 버튼 중 비슷한 것이 있는지 확인해주세요.\"\n];\n\nfunction sendPreset(i){const p=D.copilotPresets[i];if(!p)return;addChat('u',p.q);setTimeout(()=>addChat('ai',p.a),400)}\n\nfunction sendCustom(){\n  const inp=document.getElementById('co-inp');\n  const q=(inp?.value??'').trim();\n  if(!q){showToast('질문을 입력해주세요.');return}\n  addChat('u',q);\n  inp.value='';\n  const lq=q.toLowerCase();\n  let matched=null;\n  for(const pat of CHAT_PATTERNS){\n    if(pat.keys.some(k=>lq.includes(k.toLowerCase()))){matched=pat;break}\n  }\n  const r=matched?pickResponse(matched):DRES_POOL[Math.floor(Math.random()*DRES_POOL.length)];\n  setTimeout(()=>addChat('ai',r.replace(/\\n/g,'<br>')),400+Math.random()*300);\n}\nfunction addChat(role,text){const c=document.getElementById('co-chat');if(!c)return;const e=c.querySelector('.chat-empty');if(e)e.remove();const m=document.createElement('div');m.className=`cmsg cmsg-${role}`;const t=role==='ai'?text.replace(/\\{\\{teacher\\}\\}/g,getTeacherName()):text;m.innerHTML=role==='ai'?`<div class=\"cav cav-ai\">🧭<\u002Fdiv><div class=\"cbubble\">${t}<\u002Fdiv>`:`<div class=\"cav cav-u\">👤<\u002Fdiv><div class=\"cbubble\">${t}<\u002Fdiv>`;c.appendChild(m);c.scrollTop=c.scrollHeight}\n\n/* ──────────────────────────────────────────────\n   Data Source 토글 — 실제 위험도/렌더링 반영\n   ────────────────────────────────────────────── */\nconst DS_KEY='data_sources_v1';\nconst DS_DEFAULT={weather:true,meal:true,calendar:true,schoolInfo:true};\n// 각 데이터 출처 → 영향 받는 변인 ID 목록\nconst DS_VAR_MAP={\n  weather:['weather'],\n  meal:['meal'],\n  calendar:['calendar'],\n  schoolInfo:['studentCount','academicLevel','physicalFitness']\n};\n// 각 데이터 출처 → 조건 카드에서 숨길 항목 라벨\nconst DS_COND_MAP={\n  weather:['날씨'],\n  meal:['급식'],\n  calendar:['학사일정'],\n  schoolInfo:['성취도','학급당 학생수','체력']\n};\n\nfunction getDataSources(){\n  try{return {...DS_DEFAULT,...JSON.parse(localStorage.getItem(DS_KEY)||'{}')}}\n  catch(e){return {...DS_DEFAULT}}\n}\nfunction saveDataSources(s){\n  try{localStorage.setItem(DS_KEY,JSON.stringify(s))}catch(e){}\n}\nfunction isDataSourceOn(key){return getDataSources()[key]!==false}\n\nfunction toggleDataSource(el,key){\n  const s=getDataSources();\n  s[key]=!s[key];\n  el.classList.toggle('on',s[key]);\n  saveDataSources(s);\n  applyDataSourceState();\n  const onOff=s[key]?'활성화':'비활성화';\n  const names={weather:'기상청',meal:'급식',calendar:'학사일정',schoolInfo:'학교알리미'};\n  showToast(`${names[key]} 데이터를 ${onOff}했습니다`);\n}\n\n/* 모든 데이터 출처 상태를 실제 모델·화면에 반영 */\nfunction applyDataSourceState(){\n  const s=getDataSources();\n  // 1) 위험도 변인 제외 셋 재구성\n  _excludedFactors.clear();\n  for(const[src,vars] of Object.entries(DS_VAR_MAP)){\n    if(!s[src])vars.forEach(v=>_excludedFactors.add(v));\n  }\n  // 2) 위험도 재계산 + 대시보드 재렌더링\n  if(typeof D!=='undefined'){\n    const rr=calcRisk(D,_excludedFactors);\n    renderDash(rr,D);\n  }\n  // 3) 캘린더 탭이 활성화돼 있으면 학사일정 재렌더링\n  if(document.getElementById('tab-calendar')?.classList.contains('active')){\n    renderSchedule();\n  }\n  // 4) 조건 카드 행 표시/숨김\n  applyConditionVisibility();\n}\n\n/* 조건 카드에서 비활성 데이터 행 숨김 */\nfunction applyConditionVisibility(){\n  const s=getDataSources();\n  const hiddenLabels=new Set();\n  for(const[src,labels] of Object.entries(DS_COND_MAP)){\n    if(!s[src])labels.forEach(l=>hiddenLabels.add(l));\n  }\n  document.querySelectorAll('#cond-grid .cond-row').forEach(row=>{\n    const lbl=row.querySelector('.cond-label')?.childNodes[0]?.textContent?.trim();\n    row.style.display=hiddenLabels.has(lbl)?'none':'';\n  });\n}\n\n/* 초기 로딩 시 저장된 토글 상태 복원 */\nfunction initDataSourceToggles(){\n  const s=getDataSources();\n  document.querySelectorAll('.tgl[data-src]').forEach(el=>{\n    const key=el.dataset.src;\n    el.classList.toggle('on',s[key]!==false);\n  });\n}\n\n/* ── Calendar / Reminders / AI Secretary ── */\nconst REM_KEY='reminders_v1';\nconst _CAL_TODAY='2026-05-14';\nfunction _gr(){try{return JSON.parse(localStorage.getItem(REM_KEY)||'[]')}catch(e){return[]}}\nfunction _sr(a){try{localStorage.setItem(REM_KEY,JSON.stringify(a))}catch(e){}}\nfunction _esc(s){return s.replace(/[&<>\"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;'}[c]))}\n\nfunction renderSchedule(){\n  const el=document.getElementById('cal-schedule-list');if(!el)return;\n  // NEIS 학사일정 비활성화 시 안내 표시\n  if(!isDataSourceOn('calendar')){\n    el.innerHTML='<div class=\"cal-empty\" style=\"color:#92400E;background:#FEF3C7;padding:14px;border-radius:8px;border-left:3px solid #F59E0B;text-align:left\"><strong>📅 NEIS 학사일정 API 비활성화<\u002Fstrong><br>설정 → 활용 데이터 설정에서 활성화하면 학사일정이 표시됩니다.<br>(내 리마인더는 그대로 사용 가능)<\u002Fdiv>';\n    return;\n  }\n  const sch=D.calendar?.monthSchedule??[];\n  if(!sch.length){el.innerHTML='<div class=\"cal-empty\">이번 달 일정이 없습니다.<\u002Fdiv>';return}\n  el.innerHTML=sch.map(s=>{\n    const past=s.date<_CAL_TODAY,td=s.date===_CAL_TODAY;\n    const dl=s.date.slice(5).replace('-','/');\n    const tc={exam:'#DC2626',event:'#0284C7',meeting:'#7C3AED'}[s.type]||'#64748B';\n    const tl={exam:'시험',event:'행사',meeting:'회의'}[s.type]||'기타';\n    return `<div class=\"cal-row\" style=\"opacity:${past?0.45:1};border-left:3px solid ${tc}\"><div class=\"cal-date\">${dl}${td?' <span class=\"cal-today-mark\">오늘<\u002Fspan>':''}<\u002Fdiv><div class=\"cal-text\"><span class=\"cal-icon\">${s.icon||'📌'}<\u002Fspan><span class=\"cal-title\">${s.title}<\u002Fspan><span class=\"cal-type\" style=\"background:${tc}1A;color:${tc}\">${tl}<\u002Fspan><\u002Fdiv><\u002Fdiv>`;\n  }).join('');\n}\n\nfunction renderReminders(){\n  const el=document.getElementById('rem-list');if(!el)return;\n  const rs=_gr().sort((a,b)=>a.date>b.date?1:-1);\n  if(!rs.length){el.innerHTML='<div class=\"cal-empty\">아직 리마인더가 없습니다.<br>위 입력란에서 추가해보세요.<\u002Fdiv>';return}\n  el.innerHTML=rs.map(r=>`<div class=\"rem-row\"><div class=\"rem-date\">${r.date.slice(5).replace('-','/')}<\u002Fdiv><div class=\"rem-text\">${_esc(r.text)}<\u002Fdiv><button class=\"rem-del\" onclick=\"deleteReminder('${r.id}')\">✕<\u002Fbutton><\u002Fdiv>`).join('');\n}\n\nfunction addReminder(){\n  const d=document.getElementById('rem-date')?.value;\n  const t=(document.getElementById('rem-text')?.value??'').trim();\n  if(!d){showToast('날짜를 선택해주세요');return}\n  if(!t){showToast('내용을 입력해주세요');return}\n  _sr([..._gr(),{id:'r'+Date.now(),date:d,text:t}]);\n  document.getElementById('rem-date').value='';\n  document.getElementById('rem-text').value='';\n  renderReminders();\n  showToast('리마인더가 추가되었습니다 🔔');\n}\n\nfunction deleteReminder(id){_sr(_gr().filter(r=>r.id!==id));renderReminders()}\n\nfunction addSecChat(role,text){\n  const c=document.getElementById('sec-chat');if(!c)return;\n  const e=c.querySelector('.chat-empty');if(e)e.remove();\n  const m=document.createElement('div');m.className=`cmsg cmsg-${role}`;\n  const t=role==='ai'?text.replace(/\\{\\{teacher\\}\\}/g,getTeacherName()):text;\n  m.innerHTML=role==='ai'?`<div class=\"cav cav-ai\">📅<\u002Fdiv><div class=\"cbubble\">${t}<\u002Fdiv>`:`<div class=\"cav cav-u\">👤<\u002Fdiv><div class=\"cbubble\">${t}<\u002Fdiv>`;\n  c.appendChild(m);c.scrollTop=c.scrollHeight;\n}\n\nfunction askSecretary(i){\n  // NEIS 학사일정 비활성화 시 안내 후 종료\n  if(!isDataSourceOn('calendar')){\n    const presetQs=['다음 시험은 언제?','내일 일정은?','이번 주 큰 행사?','시험 전 준비 일정 자동 추가'];\n    addSecChat('u',presetQs[i]||'질문');\n    setTimeout(()=>addSecChat('ai','⚠ <strong>NEIS 학사일정 API가 비활성화<\u002Fstrong>되어 있습니다.<br><br>학사일정 기반 답변은 제공할 수 없습니다.<br>설정 → 활용 데이터 설정에서 활성화해주세요.<br><br>💡 내 리마인더 기능은 그대로 사용 가능합니다.'),400);\n    return;\n  }\n  const sch=D.calendar?.monthSchedule??[];\n  const upcoming=sch.filter(s=>s.date>=_CAL_TODAY).sort((a,b)=>a.date>b.date?1:-1);\n  const allRems=_gr();\n  let q,a;\n  switch(i){\n    case 0:{\n      q='다음 시험은 언제?';\n      const ne=upcoming.find(s=>s.type==='exam');\n      if(ne){\n        const days=Math.round((new Date(ne.date)-new Date(_CAL_TODAY))/86400000);\n        a=`📝 다음 시험: <strong>${ne.date.slice(5).replace('-','/')}<\u002Fstrong> ${ne.title}<br><br>오늘로부터 <strong>${days}일 후<\u002Fstrong>입니다.<br><br>${days<=7?'⚠ 시험 직전 주간 — 참여 위험도 모델에서 시험 가중치(+0.40)가 자동 적용됩니다. 정리·복습 중심을 권장합니다.':'⏳ 시험 14일 전부터 참여 위험도 가중치가 단계적으로 증가합니다 (3일 전 +0.55, 7일 전 +0.40, 14일 전 +0.25).'}`;\n      }else a='🔍 이번 달 등록된 시험 일정이 없습니다.';\n      break;\n    }\n    case 1:{\n      q='내일 일정은?';\n      const tom='2026-05-15';\n      const tev=sch.filter(s=>s.date===tom);\n      const trem=allRems.filter(r=>r.date===tom);\n      a='📅 내일(5/15) 일정:<br><br>';\n      a+=tev.length?'<strong>학사일정 (NEIS)<\u002Fstrong><br>'+tev.map(s=>`• ${s.icon} ${s.title}`).join('<br>'):'학사일정: 없음';\n      if(trem.length)a+='<br><br><strong>내 리마인더<\u002Fstrong><br>'+trem.map(r=>`• 🔔 ${_esc(r.text)}`).join('<br>');\n      if(tev.some(s=>s.type==='event'))a+='<br><br>💡 행사가 있는 날은 학생 분위기가 들떠 있을 수 있습니다. 다음 날 수업 도입부에 1분 정리를 권장합니다.';\n      break;\n    }\n    case 2:{\n      q='이번 주 큰 행사?';\n      const we=sch.filter(s=>s.date>='2026-05-12'&&s.date<='2026-05-18');\n      a=we.length?'📅 이번 주(5/12~5/18) 학사일정:<br><br>'+we.map(s=>`• <strong>${s.date.slice(5).replace('-','/')}<\u002Fstrong> ${s.icon} ${s.title}`).join('<br>')+'<br><br>💡 다음 주(5/19~)부터 중간고사가 시작됩니다. 시험 직전 가중치가 단계적으로 증가합니다.':'이번 주 등록된 학사일정이 없습니다.';\n      break;\n    }\n    case 3:{\n      q='시험 전 준비 일정 자동 추가';\n      const e=upcoming.find(s=>s.type==='exam');\n      if(e){\n        const ed=new Date(e.date);\n        const tasks=[\n          {db:7,t:'📚 진도 점검 및 부족 단원 보강 계획'},\n          {db:3,t:'📝 핵심 개념 정리 자료 준비'},\n          {db:1,t:'🎯 가벼운 정리 + 학생 컨디션 관리'}\n        ];\n        const nr=tasks.map(x=>{const d=new Date(ed);d.setDate(d.getDate()-x.db);return{id:'r'+Date.now()+Math.random().toString(36).slice(2,5),date:d.toISOString().slice(0,10),text:x.t}});\n        _sr([..._gr(),...nr]);\n        renderReminders();\n        a=`✅ {{teacher}} 선생님, ${e.title} 기준으로 3개 리마인더를 자동 추가했습니다:<br><br>`+nr.map(r=>`• <strong>${r.date.slice(5).replace('-','/')}<\u002Fstrong> ${r.text}`).join('<br>')+'<br><br>📚 Hembree 1988, Marzano 2009 — 단계별 시험 준비가 시험 불안 완화 + 진도 압박 감소에 효과적입니다.';\n      }else a='🔍 이번 달 등록된 시험 일정이 없어 추가할 수 없습니다.';\n      break;\n    }\n  }\n  addSecChat('u',q);\n  setTimeout(()=>addSecChat('ai',a),400);\n}\n\n/* ── Settings ── */\nfunction saveEdit(){\n  const n=document.getElementById('ed-name')?.value.trim();\n  if(!n){showToast('이름을 입력해주세요.');return}\n  const p=getTeacherProfile();\n  p.name=n;\n  saveTeacherProfile(p);\n  renderGreeting();\n  refreshTeacherTemplates();\n  showToast(`정보가 저장되었습니다. (${n} 선생님)`);\n  closeM('edit-m');\n}\n/* ── Bug Report ── */\nconst BUG_KEY='bug_reports_v1';\nfunction openBugReport(){\n  closeM('setting-m');\n  // 모달 필드 초기화\n  const t=document.getElementById('bug-type');if(t)t.value='';\n  const x=document.getElementById('bug-text');if(x)x.value='';\n  const c=document.getElementById('bug-contact');if(c)c.value='';\n  const cc=document.getElementById('bug-charcount');if(cc)cc.textContent='0';\n  openM('bug-m');\n}\nfunction submitBugReport(){\n  const type=document.getElementById('bug-type')?.value;\n  const text=(document.getElementById('bug-text')?.value??'').trim();\n  const contact=(document.getElementById('bug-contact')?.value??'').trim();\n  if(!type){showToast('오류 유형을 선택해주세요');return}\n  if(!text||text.length<5){showToast('구체적인 내용을 5자 이상 입력해주세요');return}\n  // localStorage 저장\n  const typeLabels={risk:'위험도 계산',data:'데이터',ui:'UI',strategy:'전략 추천',ai:'AI 답변',calendar:'캘린더',etc:'기타'};\n  const report={\n    id:'b'+Date.now(),\n    timestamp:new Date().toISOString(),\n    type,typeLabel:typeLabels[type]||type,\n    text,contact\n  };\n  try{\n    const arr=JSON.parse(localStorage.getItem(BUG_KEY)||'[]');\n    arr.push(report);\n    localStorage.setItem(BUG_KEY,JSON.stringify(arr));\n  }catch(e){}\n  closeM('bug-m');\n  showToast('오류 제보가 접수되었습니다. 감사합니다 🙏');\n}\n\n/* ── Period Prediction Chart ── */\n// 직전 수업 기본값 (교시별 평균 교과 추정)\nconst DEFAULT_PREV={1:\"조회\",2:\"수학\",3:\"영어\",4:\"국어\",5:\"체육\",6:\"과학\",7:\"사회\"};\n\nfunction generatePeriodPredictions(){\n  return [1,2,3,4,5,6,7].map(p=>{\n    const modData={\n      ...D,\n      currentPeriod:{\n        period:p,\n        subject:p===5?D.currentPeriod.subject:\"—\",\n        isAfterLunch:p>=5,\n        prevLesson:{period:p-1,subject:p===5?\"체육\":DEFAULT_PREV[p]??\"국어\"}\n      },\n      meal:{...D.meal,available:p>=5}\n    };\n    const rr=calcRisk(modData);\n    return{period:p,risk:rr.riskScore,level:rr.level,isCurrent:p===D.currentPeriod.period};\n  });\n}\n\nfunction renderPredictTab(){\n  const preds=generatePeriodPredictions();\n  const chart=document.getElementById('period-chart');\n  if(!chart)return;\n\n  const maxRisk=Math.max(...preds.map(p=>p.risk));\n  chart.innerHTML='';\n\n  preds.forEach(p=>{\n    const row=document.createElement('div');\n    row.className='period-bar-row'+(p.isCurrent?' current-period':'');\n    const barWidth=Math.max(4,Math.round(p.risk/maxRisk*100));\n    row.innerHTML=`\n      <div class=\"pb-label${p.isCurrent?' pb-label-current':''}\">\n        ${p.period}교시${p.isCurrent?`<span class=\"pb-now-tag\">현재<\u002Fspan>`:''}\n      <\u002Fdiv>\n      <div class=\"pb-bar-wrap\">\n        <div class=\"pb-bar-fill\" style=\"width:0%;background:${p.level.color}\" data-w=\"${barWidth}\"><\u002Fdiv>\n        ${p.isCurrent?'<div class=\"pb-bar-cur-marker\"><\u002Fdiv>':''}\n      <\u002Fdiv>\n      <div class=\"pb-right\">\n        <span class=\"pb-pct\" style=\"color:${p.level.color}\">${p.risk}%<\u002Fspan>\n        <span class=\"pb-level\" style=\"color:${p.level.color}\">${p.level.label}<\u002Fspan>\n      <\u002Fdiv>`;\n    chart.appendChild(row);\n  });\n\n  // 애니메이션\n  requestAnimationFrame(()=>{\n    chart.querySelectorAll('.pb-bar-fill').forEach((bar,i)=>{\n      setTimeout(()=>{bar.style.width=bar.dataset.w+'%'},i*80);\n    });\n  });\n\n  // 인사이트 문장 — 위험 교시 구간(시작~끝) 자동 산출\n  const warnPeriods=preds.filter(p=>p.risk>=60).map(p=>p.period);\n  const insight=document.getElementById('predict-insight');\n  if(insight){\n    if(warnPeriods.length===0){\n      insight.textContent='오늘은 전 교시 안정 환경입니다.';\n    }else if(warnPeriods.length===1){\n      insight.textContent=`오늘은 ${warnPeriods[0]}교시 주의가 필요합니다.`;\n    }else{\n      const from=warnPeriods[0];\n      const to=warnPeriods[warnPeriods.length-1];\n      insight.textContent=`오늘은 ${from}교시부터 ${to}교시까지 주의가 필요합니다.`;\n    }\n  }\n\n  // 고정 조건 요약\n  const condEl=document.getElementById('predict-cond-summary');\n  if(condEl){\n    const items=[\n      {icon:'☁️',label:'날씨',val:`외부기온 ${D.weather.temperature}°C · 불쾌지수 ${D.weather.discomfortIndex}`},\n      {icon:'🍽',label:'급식 (5교시~)',val:`${D.meal.estimatedCalories}kcal · 고열량`},\n      {icon:'📅',label:'학사일정',val:`전날 행사: ${D.calendar.yesterdayEvents?.join('·')??'없음'}`},\n      {icon:'👥',label:'학급',val:`${D.classProfile.studentCount}명 · 체력 ${D.classProfile.physicalFitnessLevel} · 성취도 ${D.classProfile.academicAchievementLevel}`},\n    ];\n    condEl.innerHTML=items.map(it=>`<div class=\"pcs-row\">\n      <div class=\"pcs-left\"><span class=\"pcs-icon\">${it.icon}<\u002Fspan><span>${it.label}<\u002Fspan><\u002Fdiv>\n      <span class=\"pcs-val\">${it.val}<\u002Fspan>\n    <\u002Fdiv>`).join('');\n  }\n}\n\n/* ── Teacher Profile & Advisor ── */\nconst STYLE_LABELS={lecture:'강의 중심',balanced:'균형형',activity:'활동 중심'};\nconst STYLE_DESCS={\n  lecture:'주로 설명 중심으로 수업합니다. 명확한 전달과 판서, 체계적 설명을 선호합니다.',\n  balanced:'강의와 활동을 상황에 따라 혼합합니다. 설명과 참여형 활동을 균형 있게 활용합니다.',\n  activity:'학생 활동 중심으로 수업합니다. 모둠 활동, 토의, 체험을 선호합니다.'\n};\nconst STYLE_TIPS={\n  lecture:{\n    pe_trans:\"오늘 학습 목표를 칠판에 적으며 시작하세요. 시각적 목표가 집중 전환을 도와줍니다.\",\n    check15:\"설명 중 '여기까지 이해됐나요?' 확인 질문 1개로 집중을 환기하세요.\",\n    trough25:\"잠깐 멈추고 학생이 핵심 내용을 노트에 2분 정리하게 하세요.\",\n    event:\"'스포츠 한마당은 수업 끝나고 얘기하겠습니다'로 명확히 정리하세요.\",\n    wrap:\"핵심 개념을 칠판에 한 문장으로 정리하고 학생에게 확인받으세요.\"\n  },\n  balanced:{\n    pe_trans:\"교과서 펼치고 1분 묵독 → 핵심 질문 1개로 자연스럽게 시작하세요.\",\n    check15:\"멍함·눈 감음이 보이면 확인 질문 1개 또는 활동 1개로 환기하세요.\",\n    trough25:\"30초 스트레칭 허용 또는 짝 확인 질문 1개로 에너지를 올리세요.\",\n    event:\"'수업 끝나고 같이 얘기해요'로 간결하게 정리하세요.\",\n    wrap:\"'오늘 가장 기억에 남는 것 하나만' → 손들기로 마무리하세요.\"\n  },\n  activity:{\n    pe_trans:\"짝과 함께 '지난 시간 핵심 단어 3개 말하기'로 활동적으로 시작하세요.\",\n    check15:\"1분 짝 토의를 삽입하세요. 체육 직후 학생들은 활동에 반응이 빠릅니다.\",\n    trough25:\"모둠 내 1분 빠른 토의로 에너지를 전환하세요.\",\n    event:\"가볍게 웃으며 '내일 한마당 얘기는 나중에!'로 분위기를 유지하세요.\",\n    wrap:\"짝과 오늘 배운 것 한 가지씩 말하고 수업을 마무리하세요.\"\n  }\n};\n\nfunction getTeacherProfile(){try{return Object.assign({style:\"balanced\",name:\"김교육\"},JSON.parse(localStorage.getItem('suop_profile')||'{}'))}catch(e){return{style:\"balanced\",name:\"김교육\"}}}\nfunction getTeacherName(){return getTeacherProfile().name||\"김교육\"}\n\n/* 정적 HTML 내 {{teacher}} 토큰을 실제 이름으로 치환 */\nfunction refreshTeacherTemplates(){\n  const name=getTeacherName();\n  document.querySelectorAll('[data-teacher-tpl]').forEach(el=>{\n    if(!el.dataset.teacherOrig)el.dataset.teacherOrig=el.innerHTML;\n    el.innerHTML=el.dataset.teacherOrig.replace(/\\{\\{teacher\\}\\}/g,name);\n  });\n}\nfunction saveTeacherProfile(p){localStorage.setItem('suop_profile',JSON.stringify(p))}\n\n/* ── 헤더 인사말 렌더 ── */\nfunction renderGreeting(){\n  const p=getTeacherProfile();\n  const el=document.getElementById('hdr-greet-name');\n  if(el)el.textContent=p.name||'선생님';\n  const setEl=document.getElementById('set-name-val');\n  if(setEl)setEl.textContent=p.name||'-';\n}\n\n/* ── 편집 모달 진입: 저장된 이름 불러오기 ── */\nfunction openEditModal(){\n  const p=getTeacherProfile();\n  const inp=document.getElementById('ed-name');\n  if(inp)inp.value=p.name||'';\n  openM('edit-m');\n}\n\nlet _pendingStyle=null;\nfunction openStyleModal(){\n  const p=getTeacherProfile();_pendingStyle=p.style;\n  document.querySelectorAll('.style-sel-btn').forEach(b=>b.classList.toggle('sel',b.dataset.style===p.style));\n  _t('#style-desc',STYLE_DESCS[p.style]||'');\n  openM('style-m');\n}\nfunction selectStyle(style,btn){\n  _pendingStyle=style;\n  document.querySelectorAll('.style-sel-btn').forEach(b=>b.classList.remove('sel'));\n  btn.classList.add('sel');\n  _t('#style-desc',STYLE_DESCS[style]||'');\n}\nfunction applyStyle(){\n  if(_pendingStyle){\n    const p=getTeacherProfile();\n    p.style=_pendingStyle;\n    saveTeacherProfile(p);\n    renderAdvisorCard(calcRisk(D).checkpoints);\n    showToast(`'${STYLE_LABELS[_pendingStyle]}' 스타일이 적용되었습니다.`)\n  }\n  closeM('style-m');\n}\n\nfunction renderAdvisorCard(checkpoints){\n  const el=document.getElementById('advisor-tips');if(!el)return;\n  const p=getTeacherProfile();\n  const tips=STYLE_TIPS[p.style]||STYLE_TIPS.balanced;\n  const btn=document.getElementById('style-toggle-btn');\n  if(btn)btn.textContent=(STYLE_LABELS[p.style]||'균형형')+' ›';\n  el.innerHTML='';\n  checkpoints.slice(0,4).forEach(cp=>{\n    const actionText=tips[cp.id]||cp.action;\n    const row=document.createElement('div');\n    row.innerHTML=`<div class=\"advisor-phase-lbl\">${cp.when}<\u002Fdiv>\n      <div class=\"advisor-tip\">\n        <div class=\"advisor-tip-icon\">${cp.icon}<\u002Fdiv>\n        <div class=\"advisor-tip-body\">\n          <div class=\"advisor-tip-action\">${actionText}<\u002Fdiv>\n          <div class=\"advisor-tip-reason\">${cp.basis}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>`;\n    el.appendChild(row);\n  });\n}\n\nfunction goTab(tab){\n  document.querySelectorAll('.tp').forEach(t=>t.classList.remove('active'));\n  const tp=document.getElementById(`tab-${tab}`);if(tp)tp.classList.add('active');\n  // SVG 아이콘 active 색상 처리\n  document.querySelectorAll('.bnav-item').forEach(b=>{\n    const active=b.dataset.tab===tab;\n    b.classList.toggle('active',active);\n    const svg=b.querySelector('.bnav-svg');\n    if(svg)svg.setAttribute('stroke',active?'#2563EB':'#9CA3AF');\n  });\n  document.getElementById('content').scrollTop=0;\n  hideFdp();\n  if(tab==='feedback'){renderTodayOther(D.periodComments??[]);renderMyRec()}\n  if(tab==='predict'){renderPredictTab()}\n  if(tab==='calendar'){renderSchedule();renderReminders()}\n}\n\n/* ── Modal helpers ── */\nfunction openM(id){document.getElementById(id)?.classList.add('open')}\nfunction closeM(id){document.getElementById(id)?.classList.remove('open')}\ndocument.querySelectorAll('.mov').forEach(m=>m.addEventListener('click',e=>{if(e.target===e.currentTarget)e.currentTarget.classList.remove('open')}));\ndocument.addEventListener('keydown',e=>{if(e.key==='Escape')document.querySelectorAll('.mov.open').forEach(m=>m.classList.remove('open'))});\ndocument.getElementById('co-inp')?.addEventListener('keydown',e=>{if(e.key==='Enter')sendCustom()});\n\n/* ── Utils ── */\nfunction _t(sel,txt){const e=document.querySelector(sel);if(e)e.textContent=txt}\nfunction _count(sel,target,dur=1000){const el=document.querySelector(sel);if(!el)return;const t0=performance.now(),from=0,delta=target;const step=now=>{const t=Math.min((now-t0)/dur,1),e2=1-Math.pow(1-t,3);el.textContent=Math.round(from+delta*e2);if(t<1)requestAnimationFrame(step);else el.textContent=target};requestAnimationFrame(step);setTimeout(()=>{el.textContent=target},dur+250)}\nfunction showToast(msg,ms=3200){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),ms)}\n\n/* ── Init ── */\ndocument.addEventListener('DOMContentLoaded',()=>{\n  try{\n    renderGreeting();\n    refreshTeacherTemplates();\n    initDataSourceToggles();\n    // 토글 상태 기반으로 위험도 변인 제외 셋 구성\n    const s=getDataSources();\n    for(const[src,vars] of Object.entries(DS_VAR_MAP)){\n      if(!s[src])vars.forEach(v=>_excludedFactors.add(v));\n    }\n    const rr=calcRisk(D,_excludedFactors);\n    renderDash(rr,D);\n    // 조건 카드 행 표시/숨김 (renderConditions가 실행된 직후)\n    applyConditionVisibility();\n    // 오류 제보 글자수 카운터\n    const bugText=document.getElementById('bug-text');\n    const bugCount=document.getElementById('bug-charcount');\n    if(bugText&&bugCount){\n      bugText.addEventListener('input',()=>{bugCount.textContent=bugText.value.length});\n    }\n  }catch(e){console.error(e)}\n});\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
