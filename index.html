  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html lang=\"ko\"><head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width,initial-scale=1.0\">\n<title>수업 나침반<\u002Ftitle>\n<style>\n/* ══════════════ TOKENS ══════════════ */\n:root{\n  --blue:#3B82F6;--blue-dk:#2563EB;--blue-lt:#EFF6FF;\n  --orange:#F97316;--orange-lt:#FFF7ED;--orange-dk:#EA580C;\n  --amber:#D97706;--amber-lt:#FEF3C7;\n  --green:#16A34A;--green-lt:#DCFCE7;\n  --red:#DC2626;--red-lt:#FEE2E2;\n  --gray-bg:#F2F2F7;\n  --card:#FFFFFF;--border:#E5E7EB;\n  --g100:#F3F4F6;--g200:#E5E7EB;--g300:#D1D5DB;\n  --g400:#9CA3AF;--g500:#6B7280;--g700:#374151;--g900:#111827;\n  --r:16px;--r-sm:10px;\n  --sh:0 2px 8px rgba(0,0,0,.07),0 1px 3px rgba(0,0,0,.05);\n  --sh-md:0 4px 20px rgba(0,0,0,.10),0 2px 6px rgba(0,0,0,.06);\n  --sh-lg:0 12px 40px rgba(0,0,0,.15);\n  --hdr:60px;--info:48px;--nav:64px;\n  --tr:.18s ease;\n}\n*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}\nhtml,body{height:100%;background:#12131F}\nbody{display:flex;justify-content:center;align-items:flex-start;font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR','Malgun Gothic',sans-serif;font-size:14px;-webkit-font-smoothing:antialiased}\nbutton{cursor:pointer;border:none;background:none;font:inherit}\ntextarea,input,select{font:inherit}\n\n/* ══════════════ APP SHELL ══════════════ */\n#app{\n  width:100%;max-width:480px;height:100dvh;height:100vh;\n  background:var(--gray-bg);display:flex;flex-direction:column;overflow:hidden;\n  box-shadow:0 0 0 1px rgba(255,255,255,.07),0 0 60px rgba(0,0,0,.8),0 30px 120px rgba(0,0,0,.5);\n  position:relative;\n}\n\n/* ══════════════ HEADER ══════════════ */\n#hdr{\n  flex-shrink:0;height:var(--hdr);background:var(--card);\n  border-bottom:1px solid var(--border);\n  padding:0 18px;display:flex;align-items:center;gap:12px;\n}\n.hdr-left{display:flex;align-items:center;gap:10px;flex-shrink:0}\n.hdr-logo-wrap{\n  width:38px;height:38px;border-radius:11px;\n  background:#FFFFFF center/cover no-repeat;\n  display:flex;align-items:center;justify-content:center;\n  box-shadow:0 1px 2px rgba(15,23,42,.10),0 4px 12px rgba(15,23,42,.08);\n  position:relative;overflow:hidden;\n}\n.hdr-logo-wrap::after{\n  content:\"\";position:absolute;inset:0;border-radius:inherit;\n  box-shadow:inset 0 0 0 .5px rgba(15,23,42,.10);\n  pointer-events:none;\n}\n.hdr-title{font-size:17px;font-weight:800;color:var(--g900);letter-spacing:-.03em;line-height:1.2;white-space:nowrap}\n.hdr-greeting{\n  flex:1;min-width:0;text-align:right;\n  font-size:12.5px;font-weight:500;color:var(--g500);\n  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;\n  line-height:1.3;\n}\n.hdr-greet-name{font-weight:800;color:var(--g900)}\n.hdr-bell{\n  width:36px;height:36px;border-radius:50%;background:var(--g100);\n  display:flex;align-items:center;justify-content:center;font-size:17px;\n  transition:background var(--tr);position:relative;flex-shrink:0;\n}\n.hdr-bell:hover{background:var(--g200)}\n.hdr-bell-dot{position:absolute;top:6px;right:6px;width:8px;height:8px;border-radius:50%;background:#EF4444;border:1.5px solid var(--card)}\n\n/* ══════════════ INFO BAR ══════════════ */\n#info-bar{\n  flex-shrink:0;height:var(--info);background:var(--card);\n  border-bottom:1px solid var(--border);\n  padding:0 18px;display:flex;align-items:center;gap:0;\n}\n.ib-item{display:flex;align-items:center;gap:5px;font-size:12.5px;font-weight:600;color:var(--g700);white-space:nowrap}\n.ib-icon{font-size:14px;color:var(--blue)}\n.ib-div{width:1px;height:18px;background:var(--g200);flex-shrink:0;margin:0 10px}\n\n/* ══════════════ CONTENT AREA ══════════════ */\n#content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}\n.tp{display:none;padding:14px 14px 20px;min-height:100%}\n.tp.active{display:block}\n\n/* ══════════════ CARD ══════════════ */\n.card{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);margin-bottom:12px;overflow:hidden}\n.card-hd{padding:16px 18px 0;display:flex;align-items:center;justify-content:space-between}\n.card-mini-desc{font-size:11.5px;color:var(--g500);padding:4px 18px 0;line-height:1.5;font-weight:500}\n\n/* 참여 위험도 개념 박스 (rl-m 모달) */\n.concept-box{background:#EFF6FF;border-left:3px solid #2563EB;padding:12px 14px;border-radius:8px;margin:14px 0 12px}\n.cb-title{font-size:13.5px;font-weight:800;color:#1E3A8A;margin:0 0 6px}\n.cb-body{font-size:12px;color:#1E40AF;line-height:1.65;margin:0;font-weight:500}\n.concept-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}\n.cr-col{padding:10px 12px;border-radius:8px;font-size:11.5px;line-height:1.55}\n.cr-ok{background:#F0FDF4;border:1px solid #BBF7D0}\n.cr-ng{background:#FEF2F2;border:1px solid #FECACA}\n.cr-hd{font-weight:800;font-size:12px;margin-bottom:5px}\n.cr-ok .cr-hd{color:#15803D}\n.cr-ng .cr-hd{color:#B91C1C}\n.cr-bd{color:#334155;line-height:1.55}\n.concept-warn{background:#FFFBEB;border:1px solid #FDE68A;border-left:3px solid #F59E0B;padding:11px 14px;border-radius:8px;font-size:11.5px;color:#78350F;line-height:1.65}\n.card-title{font-size:17px;font-weight:800;color:var(--g900);display:flex;align-items:center;gap:6px}\n.card-info-btn{width:20px;height:20px;border-radius:50%;background:var(--g100);color:var(--g400);font-size:11px;display:flex;align-items:center;justify-content:center;transition:all var(--tr)}\n.card-info-btn:hover{background:var(--blue);color:#fff}\n.card-link{font-size:12.5px;font-weight:600;color:var(--blue);display:flex;align-items:center;gap:2px}\n.card-body{padding:14px 18px 18px}\n\n/* ══════════════ RISK CARD ══════════════ */\n.risk-layout{display:flex;flex-direction:column;align-items:center;gap:10px;padding:14px 18px 18px}\n\n/* Compass gauge */\n.thermo-wrap{display:flex;justify-content:center;margin-bottom:-4px}\n\n/* Score column */\n.risk-score-col{display:flex;flex-direction:row;align-items:center;gap:14px;flex-wrap:wrap;justify-content:center}\n.score-big{font-size:54px;font-weight:900;line-height:1;letter-spacing:-.06em;transition:color .5s ease}\n.score-pct-sym{font-size:22px;font-weight:700;color:var(--g400);transition:color .5s ease;margin-left:2px}\n.risk-level-badge{font-size:13px;font-weight:700;padding:5px 16px;border-radius:20px;border:1.5px solid transparent;transition:all .5s ease}\n\n/* Message column */\n.risk-msg-col{display:flex;flex-direction:row;align-items:center;gap:12px;padding:11px 14px;background:#F8FAFC;border-radius:12px;width:100%;box-sizing:border-box}\n.risk-msg-icon-wrap{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;transition:background .5s ease;flex-shrink:0}\n.risk-msg-text{font-size:13px;font-weight:700;color:var(--g700);line-height:1.5;flex:1;text-align:left}\n\n/* ══════════════ FACTOR CHIPS ══════════════ */\n.factor-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;padding:0 18px 18px}\n.factor-chip{display:flex;align-items:center;gap:8px;padding:10px 24px 10px 11px;background:var(--g100);border-radius:var(--r-sm);cursor:pointer;transition:all var(--tr);border:1.5px solid transparent;position:relative}\n.factor-chip:hover{background:var(--blue-lt);border-color:#BFDBFE}\n.factor-chip:hover .fc-exclude{opacity:1}\n.factor-chip.active{background:var(--blue-lt);border-color:var(--blue)}\n.fc-exclude{position:absolute;top:3px;right:3px;width:18px;height:18px;border-radius:50%;background:rgba(15,23,42,0.06);border:none;font-size:10px;font-weight:700;color:var(--g500);display:flex;align-items:center;justify-content:center;cursor:pointer;line-height:1;padding:0;opacity:0.55;transition:all .15s ease}\n.fc-exclude:hover{background:#FEE2E2;color:#DC2626;opacity:1}\n.fc-rank{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;flex-shrink:0}\n.fc-name{flex:1;font-size:12.5px;font-weight:700;color:var(--g800);line-height:1.3;min-width:0}\n.fc-weight{font-size:11px;font-weight:800;color:var(--g500);background:var(--g200);padding:3px 7px;border-radius:6px;flex-shrink:0}\n/* Rank colors */\n.fc-rank-1{background:#F97316}\n.fc-rank-2{background:#94A3B8}\n.fc-rank-3{background:#78350F}\n.fc-rank-n{background:var(--blue)}\n\n/* Factor detail panel */\n#fdp{margin:0 18px 18px;padding:12px 14px;background:var(--blue-lt);border-radius:var(--r-sm);border:1px solid #BFDBFE;animation:fadeSlide .18s ease}\n@keyframes fadeSlide{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}\n.fdp-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}\n.fdp-label{font-size:13.5px;font-weight:700;color:var(--g900)}\n.fdp-close{font-size:14px;color:var(--g400);padding:2px 5px;border-radius:5px;transition:background var(--tr)}\n.fdp-close:hover{background:var(--g200)}\n.fdp-basis{font-size:12px;color:var(--g600);line-height:1.6;margin-bottom:9px;padding-bottom:9px;border-bottom:1px solid #BFDBFE}\n.fdp-meta{display:grid;grid-template-columns:60px 1fr;gap:4px 8px;font-size:11.5px}\n.fdp-meta dt{color:var(--g400);font-weight:500}\n.fdp-meta dd{color:var(--g700);font-weight:600}\n.hvac-box{margin-top:8px;padding:7px 10px;background:#FFFBEB;border-radius:7px;border-left:2.5px solid #F59E0B}\n.hvac-t{font-size:10px;font-weight:700;color:#D97706;margin-bottom:2px}\n.hvac-b{font-size:11px;color:var(--g500);line-height:1.6}\n\n/* ══════════════ CONDITIONS GRID ══════════════ */\n.cond-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;padding:0 18px 18px}\n.cond-row{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid var(--g100);cursor:pointer;transition:background .15s}\n.cond-row:hover{background:rgba(2,132,199,.055)}\n.cond-row:active{background:rgba(2,132,199,.1)}\n.cond-go{flex-shrink:0;color:var(--g300);font-size:16px;font-weight:700;transition:transform .15s,color .15s;margin-left:2px}\n.cond-row:hover .cond-go{color:#0284C7;transform:translateX(2px)}\n.c d{background:rgba(59,130,246,.06);border-radius:9px;padding:7px 9px;margin:0 -9px}\n.pb-label{font-size:13px;font-weight:700;color:var(--g700);text-align:center}\n.pb-label-current{color:var(--blue-dk)}\n.pb-bar-wrap{position:relative;height:22px;background:var(--g100);border-radius:6px;overflow:hidden}\n.pb-bar-fill{height:100%;border-radius:6px;transition:width 1.2s cubic-bezier(.4,0,.2,1)}\n.pb-bar-cur-marker{position:absolute;top:0;right:0;bottom:0;width:3px;background:rgba(255,255,255,.6);border-radius:0 6px 6px 0}\n.pb-right{display:flex;flex-direction:column;align-items:flex-end;gap:1px}\n.pb-pct{font-size:13px;font-weight:800;line-height:1}\n.pb-level{font-size:9.5px;font-weight:700;white-space:nowrap}\n.pb-now-tag{display:inline-block;font-size:9px;font-weight:700;background:var(--blue-dk);color:#fff;border-radius:4px;padding:1px 5px;margin-left:4px;vertical-align:middle}\n/* Predict cond summary */\n.pcs-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--g100);font-size:13px}\n.pcs-row:last-child{border-bottom:none;padding-bottom:0}\n.pcs-left{display:flex;align-items:center;gap:7px;color:var(--g600)}\n.pcs-icon{font-size:15px;width:20px;text-align:center}\n.pcs-val{font-weight:700;color:var(--g900)}\n#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(14px);background:var(--g900);color:#fff;font-size:12px;font-weight:500;padding:10px 20px;border-radius:20px;box-shadow:var(--sh-lg);opacity:0;pointer-events:none;z-index:300;white-space:nowrap;transition:opacity .22s ease,transform .22s ease;max-width:340px;text-align:center}\n#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<div id=\"app\">\n\n  <!-- HEADER -->\n  <header id=\"hdr\">\n    <div class=\"hdr-left\">\n      <div class=\"hdr-logo-wrap\" style=\"background-image:url(&quot;a65a3364-49d4-4968-aadf-48419fd65d70&quot;)\" role=\"img\" aria-label=\"수업 나침반 로고\"><\u002Fdiv>\n      <div class=\"hdr-title\">수업 나침반<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"hdr-greeting\" id=\"hdr-greeting\">\n      <span class=\"hdr-greet-name\" id=\"hdr-greet-name\">김교육<\u002Fspan> 선생님, 안녕하세요 😊\n    <\u002Fdiv>\n    <button class=\"hdr-bell\" onclick=\"openM('setting-m')\" title=\"설정\">\n      <span>⚙️<\u002Fspan>\n    <\u002Fbutton>\n  <\u002Fheader>\n\n  <!-- INFO BAR -->\n  <div id=\"info-bar\">\n    <div class=\"ib-item\"><span class=\"ib-icon\">👥<\u002Fspan><span id=\"ib-class\">-학년<\u002Fspan><\u002Fdiv>\n    <div class=\"ib-div\"><\u002Fdiv>\n    <div class=\"ib-item\"><span class=\"ib-icon\">📖<\u002Fspan><span id=\"ib-subj\">국어<\u002Fspan><\u002Fdiv>\n    <div class=\"ib-div\"><\u002Fdiv>\n    <div class=\"ib-item\"><span class=\"ib-icon\">⏰<\u002Fspan><span id=\"ib-per\">5교시<\u002Fspan><\u002Fdiv>\n    <div class=\"ib-div\"><\u002Fdiv>\n    <div class=\"ib-item\"><span class=\"ib-icon\">📅<\u002Fspan><span>2026.05.14 목<\u002Fspan><\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- CONTENT -->\n  <div id=\"content\">\n\n    <!-- ████ TAB: 홈 ████ -->\n    <div id=\"tab-home\" class=\"tp active\">\n\n      <!-- RISK CARD -->\n      <div class=\"card\">\n        <div class=\"card-hd\">\n          <span class=\"card-title\">참여 위험도 진단 <button class=\"card-info-btn\" onclick=\"openM('rl-m')\">ⓘ<\u002Fbutton><\u002Fspan>\n          <span class=\"risk-ai-badge analyzing\" id=\"risk-ai-badge\" onclick=\"openAiExplain()\" title=\"AI 분석 과정 보기\">\n            <span class=\"rab-orb\"><svg width=\"9\" height=\"9\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M12 1.5 L13.7 8.9 L21 11 L13.7 13.1 L12 22.5 L10.3 13.1 L3 11 L10.3 8.9 Z\" fill=\"#fff\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n            <span class=\"rab-live\"><\u002Fspan>AI 실시간 분석<span class=\"rab-q\">?<\u002Fspan>\n          <\u002Fspan>\n        <\u002Fdiv>\n        <p class=\"card-mini-desc\">오늘 학급 환경이 학생 참여를 어렵게 만들 가능성 (Disengagement Risk)<\u002Fp>\n        <div class=\"risk-layout\" id=\"risk-layout\">\n\n          <!-- Compass Gauge -->\n          <div class=\"thermo-wrap\">\n            <svg id=\"compass-svg\" width=\"186\" height=\"126\" viewBox=\"-16 -14 232 158\" aria-label=\"수업 환경 나침반\">\n              <defs>\n                <!-- 5단계 색상 그라데이션 (좌 빨강=위험, 우 초록=안전) -->\n                <linearGradient id=\"gaugeGrad\" x1=\"0%\" x2=\"100%\" y1=\"0%\" y2=\"0%\">\n                  <stop offset=\"0%\" stop-color=\"#22C55E\"><\u002Fstop>\n                  <stop offset=\"25%\" stop-color=\"#84CC16\"><\u002Fstop>\n                  <stop offset=\"50%\" stop-color=\"#FACC15\"><\u002Fstop>\n                  <stop offset=\"75%\" stop-color=\"#F97316\"><\u002Fstop>\n                  <stop offset=\"100%\" stop-color=\"#DC2626\"><\u002Fstop>\n                <\u002FlinearGradient>\n                <!-- 바늘 그림자 (입체감) -->\n                <filter id=\"needleShadow\" x=\"-50%\" y=\"-50%\" width=\"200%\" height=\"200%\">\n                  <feGaussianBlur in=\"SourceAlpha\" stdDeviation=\"1.2\"><\u002FfeGaussianBlur>\n                  <feOffset dx=\"0\" dy=\"1.5\"><\u002FfeOffset>\n                  <feComponentTransfer><feFuncA type=\"linear\" slope=\"0.35\"><\u002FfeFuncA><\u002FfeComponentTransfer>\n                  <feMerge><feMergeNode><\u002FfeMergeNode><feMergeNode in=\"SourceGraphic\"><\u002FfeMergeNode><\u002FfeMerge>\n                <\u002Ffilter>\n              <\u002Fdefs>\n\n              <!-- ① 배경 호 (회색 베이스, 살짝 보임) -->\n              <path d=\"M 20 100 A 80 80 0 0 1 180 100\" stroke=\"#F1F5F9\" stroke-width=\"26\" fill=\"none\" stroke-linecap=\"round\"><\u002Fpath>\n\n              <!-- ② 컬러 호 (5단계 그라데이션) -->\n              <path d=\"M 20 100 A 80 80 0 0 1 180 100\" stroke=\"url(#gaugeGrad)\" stroke-width=\"22\" fill=\"none\" stroke-linecap=\"round\" opacity=\"0.92\"><\u002Fpath>\n\n              <!-- ②-b 눈금 (graduation ticks): 굵은 흰 선=구간 경계, 가는 선=세부 눈금 -->\n              <g id=\"gauge-ticks\">\n                <line x1=\"171.6\" y1=\"85.8\" x2=\"184.3\" y2=\"83.2\" stroke=\"#FFFFFF\" stroke-width=\"1.2\" stroke-linecap=\"round\" opacity=\"0.55\"><\u002Fline>\n                <line x1=\"163.7\" y1=\"73.6\" x2=\"184.1\" y2=\"65.2\" stroke=\"#FFFFFF\" stroke-width=\"2\" stroke-linecap=\"round\" opacity=\"0.85\"><\u002Fline>\n                <line x1=\"160.7\" y1=\"59.4\" x2=\"171.5\" y2=\"52.2\" stroke=\"#FFFFFF\" stroke-width=\"1.2\" stroke-linecap=\"round\" opacity=\"0.55\"><\u002Fline>\n                <line x1=\"140.6\" y1=\"39.3\" x2=\"147.8\" y2=\"28.5\" stroke=\"#FFFFFF\" stroke-width=\"1.2\" stroke-linecap=\"round\" opacity=\"0.55\"><\u002Fline>\n                <line x1=\"126.4\" y1=\"36.3\" x2=\"134.8\" y2=\"15.9\" stroke=\"#FFFFFF\" stroke-width=\"2\" stroke-linecap=\"round\" opacity=\"0.85\"><\u002Fline>\n                <line x1=\"114.2\" y1=\"28.4\" x2=\"116.8\" y2=\"15.7\" stroke=\"#FFFFFF\" stroke-width=\"1.2\" stroke-linecap=\"round\" opacity=\"0.55\"><\u002Fline>\n                <line x1=\"85.8\" y1=\"28.4\" x2=\"83.2\" y2=\"15.7\" stroke=\"#FFFFFF\" stroke-width=\"1.2\" stroke-linecap=\"round\" opacity=\"0.55\"><\u002Fline>\n                <line x1=\"73.6\" y1=\"36.3\" x2=\"65.2\" y2=\"15.9\" stroke=\"#FFFFFF\" stroke-width=\"2\" stroke-linecap=\"round\" opacity=\"0.85\"><\u002Fline>\n                <line x1=\"59.4\" y1=\"39.3\" x2=\"52.2\" y2=\"28.5\" stroke=\"#FFFFFF\" stroke-width=\"1.2\" stroke-linecap=\"round\" opacity=\"0.55\"><\u002Fline>\n                <line x1=\"39.3\" y1=\"59.4\" x2=\"28.5\" y2=\"52.2\" stroke=\"#FFFFFF\" stroke-width=\"1.2\" stroke-linecap=\"round\" opacity=\"0.55\"><\u002Fline>\n                <line x1=\"36.3\" y1=\"73.6\" x2=\"15.9\" y2=\"65.2\" stroke=\"#FFFFFF\" stroke-width=\"2\" stroke-linecap=\"round\" opacity=\"0.85\"><\u002Fline>\n                <line x1=\"28.4\" y1=\"85.8\" x2=\"15.7\" y2=\"83.2\" stroke=\"#FFFFFF\" stroke-width=\"1.2\" stroke-linecap=\"round\" opacity=\"0.55\"><\u002Fline>\n              <\u002Fg>\n\n              <!-- ③ 표정 이모지 5개 (각도 180/135/90/45/0, 호 중심선 r=80) -->\n              <text x=\"20\" y=\"100\" font-size=\"14\" text-anchor=\"middle\" dominant-baseline=\"central\">😊<\u002Ftext>\n              <text x=\"43.4\" y=\"43.4\" font-size=\"14\" text-anchor=\"middle\" dominant-baseline=\"central\">🙂<\u002Ftext>\n              <text x=\"100\" y=\"20\" font-size=\"14\" text-anchor=\"middle\" dominant-baseline=\"central\">😐<\u002Ftext>\n              <text x=\"156.6\" y=\"43.4\" font-size=\"14\" text-anchor=\"middle\" dominant-baseline=\"central\">😟<\u002Ftext>\n              <text x=\"180\" y=\"100\" font-size=\"14\" text-anchor=\"middle\" dominant-baseline=\"central\">😣<\u002Ftext>\n\n              <!-- ④ 회전 바늘 (위험도에 따라 회전) -->\n              <g id=\"compass-needle\" transform=\"rotate(-90 100 100)\">\n                <!-- 바늘: 아랫끝이 회전축(원판)에 고정, 위로 뻗는 포인터 — 계기판 침처럼 -->\n                <polygon points=\"100,34 95.5,98 100,104 104.5,98\" fill=\"#1F2937\" filter=\"url(#needleShadow)\"><\u002Fpolygon>\n                <!-- 바늘 끝 강조 (작은 원) -->\n                <circle cx=\"100\" cy=\"34\" r=\"3\" fill=\"#1F2937\"><\u002Fcircle>\n              <\u002Fg>\n\n              <!-- ⑤ 중심 회전축 (바늘 위에 겹쳐 한 몸처럼) -->\n              <circle cx=\"100\" cy=\"100\" r=\"11\" fill=\"#1F2937\"><\u002Fcircle>\n              <circle cx=\"100\" cy=\"100\" r=\"6\" fill=\"#FFFFFF\"><\u002Fcircle>\n              <circle cx=\"100\" cy=\"100\" r=\"2.5\" fill=\"#1F2937\"><\u002Fcircle>\n\n              <!-- ⑥ POOR / GOOD 라벨 -->\n              <text x=\"14\" y=\"123\" font-size=\"10\" font-weight=\"700\" fill=\"#94A3B8\" font-family=\"-apple-system,sans-serif\">안전<\u002Ftext>\n              <text x=\"172\" y=\"123\" font-size=\"10\" font-weight=\"700\" fill=\"#94A3B8\" font-family=\"-apple-system,sans-serif\">위험<\u002Ftext>\n\n              <!-- ⑦ 주요 눈금 숫자 (우측 0 = 안전, 상단 50, 좌측 100 = 위험) -->\n              <g fill=\"#64748B\" font-weight=\"700\" font-family=\"-apple-system,sans-serif\" font-size=\"11\">\n                <text x=\"4\" y=\"104\" text-anchor=\"end\">0<\u002Ftext>\n                <text x=\"100\" y=\"2\" text-anchor=\"middle\">50<\u002Ftext>\n                <text x=\"196\" y=\"104\" text-anchor=\"start\">100<\u002Ftext>\n              <\u002Fg>\n            <\u002Fsvg>\n          <\u002Fdiv>\n\n          <!-- Score -->\n          <div class=\"risk-score-col\">\n            <div style=\"display:flex;align-items:baseline;gap:1px\">\n              <span class=\"score-big\" id=\"risk-score\">--<\u002Fspan>\n              <span class=\"score-pct-sym\">%<\u002Fspan>\n            <\u002Fdiv>\n            <div class=\"risk-level-badge\" id=\"risk-lvl-badge\">분석 중<\u002Fdiv>\n            <button style=\"font-size:11px;color:var(--blue);font-weight:600;background:none;border:none;cursor:pointer;margin-top:4px\" onclick=\"openMethodModal()\">📐 측정 방식<\u002Fbutton>\n          <\u002Fdiv>\n\n          <!-- Message -->\n          <div class=\"risk-msg-col\">\n            <div class=\"risk-msg-icon-wrap\" id=\"risk-icon-wrap\">⚠️<\u002Fdiv>\n            <div class=\"risk-msg-text\" id=\"risk-msg\">분석 중입니다.<\u002Fdiv>\n          <\u002Fdiv>\n\n        <\u002Fdiv>\n\n        <!-- AI 브리핑 (실사용 핵심: AI가 오늘 조건을 읽고 한 줄 조언) -->\n        <div class=\"ai-brief thinking\" id=\"ai-brief\">\n          <div class=\"ai-brief-orb\">\n            <svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M12 1.5 L13.7 8.9 L21 11 L13.7 13.1 L12 22.5 L10.3 13.1 L3 11 L10.3 8.9 Z\" fill=\"#fff\"><\u002Fpath><\u002Fsvg>\n          <\u002Fdiv>\n          <div class=\"ai-brief-body\">\n            <div class=\"ai-brief-label\">AI 브리핑<\u002Fdiv>\n            <div class=\"ai-brief-text\" id=\"ai-brief-text\">오늘 조건을 분석하고 있습니다 <span class=\"ai-brief-dots\"><i><\u002Fi><i><\u002Fi><i><\u002Fi><\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- 데이터 출처 (이 진단이 AI 종합 결과임을 명시) -->\n        <div class=\"risk-prov\">\n          <span class=\"risk-prov-lbl\">종합 근거<\u002Fspan>\n ton class=\"bnav-item\" data-tab=\"predict\" onclick=\"goTab('predict')\">\n      <svg class=\"bnav-svg\" width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#9CA3AF\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><line x1=\"18\" y1=\"20\" x2=\"18\" y2=\"10\"><\u002Fline><line x1=\"12\" y1=\"20\" x2=\"12\" y2=\"4\"><\u002Fline><line x1=\"6\" y1=\"20\" x2=\"6\" y2=\"14\"><\u002Fline><\u002Fsvg>\n      <span>예측<\u002Fspan>\n    <\u002Fbutton>\n    <button class=\"bnav-item\" data-tab=\"strategy\" onclick=\"goTab('strategy')\">\n      <svg class=\"bnav-svg\" width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#9CA3AF\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle><path d=\"M12 8v4l3 3\"><\u002Fpath><\u002Fsvg>\n      <span>전략<\u002Fspan>\n    <\u002Fbutton>\n    <button class=\"bnav-item\" data-tab=\"calendar\" onclick=\"goTab('calendar')\">\n      <svg class=\"bnav-svg\" width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#9CA3AF\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"3\" y=\"4\" width=\"18\" height=\"18\" rx=\"2\" ry=\"2\"><\u002Frect><line x1=\"16\" y1=\"2\" x2=\"16\" y2=\"6\"><\u002Fline><line x1=\"8\" y1=\"2\" x2=\"8\" y2=\"6\"><\u002Fline><line x1=\"3\" y1=\"10\" x2=\"21\" y2=\"10\"><\u002Fline><\u002Fsvg>\n      <span>캘린더<\u002Fspan>\n    <\u002Fbutton>\n    <button class=\"bnav-item\" data-tab=\"feedback\" onclick=\"goTab('feedback')\">\n      <svg class=\"bnav-svg\" width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#9CA3AF\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z\"><\u002Fpath><\u002Fsvg>\n      <span>피드백<\u002Fspan>\n    <\u002Fbutton>\n  <\u002Fnav>\n\n<\u002Fdiv><!-- /app -->\n\n<!-- ══════════ MODALS ══════════ -->\n\n<!-- 기록 모달 -->\n<div id=\"rec-m\" class=\"mov\">\n  <div class=\"mbox\">\n    <div class=\"mbox-inner\">\n      <div class=\"m-handle\"><\u002Fdiv>\n      <h2 class=\"m-title\">수업 후 기록<\u002Fh2>\n      <p class=\"m-sub\">오늘 학급 전체 분위기를 기록합니다.<\u002Fp>\n      <div class=\"sc-row\">\n        <button class=\"scb\" data-v=\"1\" onclick=\"selSc(this)\"><span class=\"scb-n\">1<\u002Fspan>매우<br>산만<\u002Fbutton>\n        <button class=\"scb\" data-v=\"2\" onclick=\"selSc(this)\"><span class=\"scb-n\">2<\u002Fspan>산만한<br>편<\u002Fbutton>\n        <button class=\"scb\" data-v=\"3\" onclick=\"selSc(this)\"><span class=\"scb-n\">3<\u002Fspan>보통<\u002Fbutton>\n        <button class=\"scb\" data-v=\"4\" onclick=\"selSc(this)\"><span class=\"scb-n\">4<\u002Fspan>집중된<br>편<\u002Fbutton>\n        <button class=\"scb\" data-v=\"5\" onclick=\"selSc(this)\"><span class=\"scb-n\">5<\u002Fspan>매우<br>집중<\u002Fbutton>\n      <\u002Fdiv>\n      <textarea id=\"rec-ta\" class=\"m-ta\" rows=\"3\" maxlength=\"100\" placeholder=\"짧은 코멘트 (선택 · 최대 100자)\"><\u002Ftextarea>\n      <p class=\"m-hint\">※ 기록이 축적될수록 학급 맞춤 조건 보정이 가능해집니다.<\u002Fp>\n      <div class=\"m-acts\">\n        <button class=\"mbtn-s\" onclick=\"closeM('rec-m')\">취소<\u002Fbutton>\n        <button class=\"mbtn-p\" onclick=\"saveRecord()\">기록 저장<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- 위험 유형 모달 -->\n<div id=\"rl-m\" class=\"mov\">\n  <div class=\"mbox\">\n    <div class=\"mbox-inner\">\n      <div class=\"m-handle\"><\u002Fdiv>\n      <button class=\"mclose\" onclick=\"closeM('rl-m')\">✕<\u002Fbutton>\n      <h2 class=\"m-title\">참여 위험도 안내<\u002Fh2>\n      <p class=\"m-sub\">학술 출처: Engagement 이론 (Fredricks et al. 2004) — 환경 기반 추정 변형<\u002Fp>\n\n      <div class=\"concept-box\">\n        <h3 class=\"cb-title\">📌 참여 저하 위험 (Disengagement Risk)이란?<\u002Fh3>\n        <p class=\"cb-body\">오늘 학급 환경이 학생 참여를 어렵게 만들 가능성을 0~100% 척도로 추정한 값입니다. 환경 변인(교시·날씨·학사일정·학급 크기 등)의 누적도를 기반으로 합니다.<\u002Fp>\n      <\u002Fdiv>\n\n      <div class=\"concept-row\">\n        <div class=\"cr-col cr-ok\">\n          <div class=\"cr-hd\">✓ 측정하는 것<\u002Fdiv>\n          <div class=\"cr-bd\">교실 환경 변인의 누적도<br>(교시·날씨·학사일정·학급 크기·체력·성취 등)<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"cr-col cr-ng\">\n          <div class=\"cr-hd\">✗ 측정하지 않는 것<\u002Fdiv>\n          <div class=\"cr-bd\">학생 개인의 집중도·능력·태도<br>학습 성취 예측<br>교사의 직무 부담<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"concept-warn\" data-teacher-tpl=\"\">\n        <strong>⚠ 한계 — 정직한 인정<\u002Fstrong><br>\n        단일 변인 효과는 학술 검증되었으나 누적 시너지는 가설입니다. 환경 변인과 수업 참여의 관계는 상관(correlation)이며, 인과(causation)로 단정할 수 없습니다. <strong>위 수치는 정답이 아닌 참고용 지표<\u002Fstrong>이며, {{teacher}} 선생님의 현장 관찰이 우선입니다.\n      <\u002Fdiv>\n\n      <h3 style=\"font-size:14px;font-weight:800;color:var(--g800);margin:20px 0 10px\">5단계 판정 기준<\u002Fh3>\n      <div id=\"rl-grid\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- 측정 방식 모달 -->\n<div id=\"method-m\" class=\"mov\">\n  <div class=\"mbox\">\n    <div class=\"mbox-inner\">\n      <div class=\"m-handle\"><\u002Fdiv>\n      <button class=\"mclose\" onclick=\"closeM('method-m')\">✕<\u002Fbutton>\n      <h2 class=\"m-title\">📐 참여 위험도 산출 방식<\u002Fh2>\n      <p class=\"m-sub\">공공데이터 기반 8개 변인 가중치 모델 — XAI<\u002Fp>\n      <div class=\"method-formula\"><div class=\"method-eq\">참여 위험도 = Σ(변인점수 × 가중치) / 45 × 100<\u002Fdiv><div class=\"method-note\">각 변인 점수(0~1) × 가중치 합산 후 가중치 총합(45)으로 나눠 백분율 표현<\u002Fdiv><\u002Fdiv>\n      <div id=\"method-table\"><\u002Fdiv>\n      <div class=\"method-xai\"><p class=\"method-xai-t\">💡 설명 가능한 AI (XAI)<\u002Fp><p class=\"method-xai-b\">각 변인은 인지부하 이론, 식후 혈당 변화 등 교육학·인지과학 근거로 선정됐습니다. 모든 수치를 교사가 즉시 확인할 수 있습니다.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- 조건 원본 데이터 모달 -->\n<div id=\"cond-m\" class=\"mov\">\n  <div class=\"mbox\">\n    <div class=\"mbox-inner\">\n      <div class=\"m-handle\"><\u002Fdiv>\n      <button class=\"mclose\" onclick=\"closeM('cond-m')\">✕<\u002Fbutton>\n      <div id=\"cond-detail\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- AI 분석 과정 설명 모달 -->\n<div id=\"aix-m\" class=\"mov\">\n  <div class=\"mbox\">\n    <div class=\"mbox-inner\">\n      <div class=\"m-handle\"><\u002Fdiv>\n      <button class=\"mclose\" onclick=\"closeM('aix-m')\">✕<\u002Fbutton>\n      <div id=\"aix-body\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- 설정 모달 -->\n<div id=\"setting-m\" class=\"mov\">\n  <div class=\"mbox\">\n    <div class=\"mbox-inner\">\n      <div class=\"m-handle\"><\u002Fdiv>\n      <button class=\"mclose\" onclick=\"closeM('setting-m')\">✕<\u002Fbutton>\n      <h2 class=\"m-title\" style=\"margin-bottom:16px\">설정<\u002Fh2>\n      <div class=\"sw\">\n        <div class=\"scard\">\n          <div class=\"scard-hd\"><span class=\"scard-icon\">👤<\u002Fspan><div><div class=\"scard-title\">내 정보<\u002Fdiv><div class=\"scard-sub\">이름, 담당 과목<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n          <div class=\"scard-body\">\n            <div class=\"srow\"><div><div class=\"srow-lbl\">이름<\u002Fdiv><div class=\"srow-val\" id=\"set-name-val\">김교육<\u002Fdiv><\u002Fdiv><button class=\"edit-btn\" onclick=\"closeM('setting-m');openEditModal()\">편집<\u002Fbutton><\u002Fdiv>\n            <div class=\"srow\"><div class=\"srow-lbl\">학교<\u002Fdiv><div style=\"font-size:12px;color:var(--g400)\">서울대학교사범대학부설중학교<\u002Fdiv><\u002Fdiv>\n            <div class=\"srow\"><div class=\"srow-lbl\">담당 과목<\u002Fdiv><div style=\"font-size:12px;color:var(--g400)\">국어<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"scard\">\n          <div class=\"scard-hd\"><span class=\"scard-icon\">📡<\u002Fspan><div><div class=\"scard-title\">활용 데이터 설정<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n          <div class=\"scard-body\">\n            <div class=\"srow\"><div><div class=\"srow-lbl\">☁️ 기상청 단기예보 API<\u002Fdiv><\u002Fdiv><div class=\"tgl on\" data-src=\"weather\" onclick=\"toggleDataSource(this,'weather')\"><\u002Fdiv><\u002Fdiv>\n            <div class=\"srow\"><div><div class=\"srow-lbl\">🍽 NEIS 급식식단정보 API<\u002Fdiv><\u002Fdiv><div class=\"tgl on\" data-src=\"meal\" onclick=\"toggleDataSource(this,'meal')\"><\u002Fdiv><\u002Fdiv>\n            <div class=\"srow\"><div><div class=\"srow-lbl\">📅 NEIS 학사일정 API<\u002Fdiv><\u002Fdiv><div class=\"tgl on\" data-src=\"calendar\" onclick=\"toggleDataSource(this,'calendar')\"><\u002Fdiv><\u002Fdiv>\n            <div class=\"srow\"><div><div class=\"srow-lbl\">🏫 학교알리미 공시 데이터<\u002Fdiv><\u002Fdiv><div class=\"tgl on\" data-src=\"schoolInfo\" onclick=\"toggleDataSource(this,'schoolInfo')\"><\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"scard\">\n          <div class=\"scard-body\" style=\"padding-top:4px\">\n            <div class=\"slink\" onclick=\"openBugReport()\"><span class=\"slink-lbl\">🐛 오류 제보<\u002Fspan><span class=\"slink-arr\">›<\u002Fspan><\u002Fdiv>\n            <div class=\"slink\" onclick=\"closeM('setting-m');openM('priv-m')\"><span class=\"slink-lbl\">🔒 개인정보 보호 방침<\u002Fspan><span class=\"slink-arr\">›<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"scard\">\n          <div class=\"ai-info\" style=\"padding-top:4px\">\n            <div class=\"ai-row\"><span class=\"ai-lbl\">버전<\u002Fspan><span class=\"ai-val\">v1.0.0 (beta)<\u002Fspan><\u002Fdiv>\n            <div class=\"ai-row\"><span class=\"ai-lbl\">제작<\u002Fspan><span class=\"ai-val\">교육 공공데이터 × AI 공모전팀<\u002Fspan><\u002Fdiv>\n            <div class=\"ai-row\"><span class=\"ai-lbl\">데이터<\u002Fspan><span class=\"ai-val\">기상청 · NEIS · 학교알리미<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- 내 정보 편집 모달 -->\n<div id=\"edit-m\" class=\"mov\">\n  <div class=\"mbox\">\n    <div class=\"mbox-inner\">\n      <div class=\"m-handle\"><\u002Fdiv>\n      <button class=\"mclose\" onclick=\"closeM('edit-m')\">✕<\u002Fbutton>\n      <h2 class=\"m-title\">내 정보 수정<\u002Fh2>\n      <p class=\"m-sub\" style=\"margin-bottom:16px\">변경 후 저장하면 앱 전체에 반영됩니다.<\u002Fp>\n      <div class=\"ef\"><div class=\"ef-lbl\">이름<\u002Fdiv><input type=\"text\" class=\"ef-inp\" id=\"ed-name\" value=\"김교육\"><\u002Fdiv>\n      <div class=\"ef\"><div class=\"ef-lbl\">담당 과목<\u002Fdiv><select class=\"ef-inp\" style=\"appearance:auto\"><option selected=\"\">국어<\u002Foption><option>수학<\u002Foption><option>영어<\u002Foption><option>과학<\u002Foption><option>사회<\u002Foption><option>체육<\u002Foption><option>음악<\u002Foption><option>미술<\u002Foption><\u002Fselect><\u002Fdiv>\n      <div class=\"m-acts\"><button class=\"mbtn-s\" onclick=\"closeM('edit-m')\">취소<\u002Fbutton><button class=\"mbtn-p\" onclick=\"saveEdit()\">저장<\u002Fbutton><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- 개인정보 모달 -->\n<div id=\"priv-m\" class=\"mov\">\n  <div class=\"mbox\">\n    <div class=\"mbox-inner\">\n      <div class=\"m-handle\"><\u002Fdiv>\n      <button class=\"mclose\" onclick=\"closeM('priv-m')\">✕<\u002Fbutton>\n      <h2 class=\"m-title\">🔒 개인정보 보호 방침<\u002Fh2>\n      <div class=\"priv-body\">\n        <h3>1. 수집하는 정보<\u002Fh3><p>교사가 입력하는 수업 후 기록과 이름, 과목 정보를 수집합니다. 해당 데이터는 기기 내 로컬 스토리지에만 저장되며 외부 서버로 전송되지 않습니다.<\u002Fp>\n        <h3>2. 공공데이터 활용<\u002Fh3><p>기상청, NEIS, 학교알리미에서 제공하는 공공데이터를 활용합니다. 해당 데이터는 개인정보를 포함하지 않으며 공개 API를 통해 합법적으로 수집됩니다.<\u002Fp>\n        <h3>3. 학생 개인정보<\u002Fh3><p>수업 나침반은 학생 개인을 식별하거나 평가하지 않습니다. 학급 단위 환경 분석만 수행합니다.<\u002Fp>\n        <h3>4. 데이터 보관<\u002Fh3><p>모든 데이터는 사용자의 기기 내에만 저장됩니다. 브라우저 데이터 삭제 시 함께 삭제됩니다.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- Bug Report Modal -->\n<div id=\"bug-m\" class=\"mov\">\n  <div class=\"mbox\">\n    <div class=\"mbox-inner\">\n      <div class=\"m-handle\"><\u002Fdiv>\n      <button class=\"mclose\" onclick=\"closeM('bug-m')\">✕<\u002Fbutton>\n      <h2 class=\"m-title\">🐛 오류 제보<\u002Fh2>\n      <p class=\"m-sub\">불편하셨던 점을 알려주시면 빠르게 개선하겠습니다.<\u002Fp>\n\n      <div style=\"margin-top:14px\">\n        <label style=\"font-size:12px;font-weight:700;color:var(--g700);display:block;margin-bottom:6px\">오류 유형<\u002Flabel>\n        <select id=\"bug-type\" class=\"bug-input\" style=\"width:100%\">\n          <option value=\"\">선택해주세요<\u002Foption>\n          <option value=\"risk\">위험도 계산 오류 (점수가 이상함)<\u002Foption>\n          <option value=\"data\">데이터 오류 (시간표·급식·일정 등이 틀림)<\u002Foption>\n          <option value=\"ui\">UI 오류 (화면이 깨지거나 버튼이 안 됨)<\u002Foption>\n          <option value=\"strategy\">전략 추천 오류 (추천이 맞지 않음)<\u002Foption>\n          <option value=\"ai\">AI 답변 오류 (엉뚱한 답변)<\u002Foption>\n          <option value=\"calendar\">캘린더 / 리마인더 오류<\u002Foption>\n          <option value=\"etc\">기타<\u002Foption>\n        <\u002Fselect>\n      <\u002Fdiv>\n\n      <div style=\"margin-top:14px\">\n        <label style=\"font-size:12px;font-weight:700;color:var(--g700);display:block;margin-bottom:6px\">구체적인 내용<\u002Flabel>\n        <textarea id=\"bug-text\" class=\"bug-input\" rows=\"5\" maxlength=\"500\" placeholder=\"어떤 상황에서 어떤 오류가 발생했는지 적어주세요. (최대 500자)\"><\u002Ftextarea>\n        <div style=\"font-size:11px;color:var(--g400);text-align:right;margin-top:4px\">\n          <span id=\"bug-charcount\">0<\u002Fspan> / 500\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"margin-top:14px\">\n        <label style=\"font-size:12px;font-weight:700;color:var(--g700);display:block;margin-bottom:6px\">연락처 (선택)<\u002Flabel>\n        <input id=\"bug-contact\" type=\"text\" class=\"bug-input\" style=\"width:100%\" maxlength=\"80\" placeholder=\"이메일 등 (회신을 원하시는 경우)\">\n      <\u002Fdiv>\n\n      <div style=\"margin-top:16px;padding:10px 12px;background:#F8FAFC;border-radius:8px;font-size:11px;color:var(--g500);line-height:1.55\">\n        ℹ 본 데모 단계에서는 제보 내용이 브라우저 로컬에 저장됩니다.<br>실제 서비스에서는 운영팀에게 전송됩니다.\n      <\u002Fdiv>\n\n      <div style=\"margin-top:14px;displa
